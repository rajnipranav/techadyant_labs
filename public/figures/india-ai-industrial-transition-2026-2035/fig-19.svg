   <g id="text_1">
    <text x="101.65" y="124.56" font-family="Arial, Helvetica, sans-serif" font-size="12.0" fill="#0f1828">DESIGN</text>
   </g>
   <g id="text_2">
    <text x="101.65" y="143.41" font-family="Arial, Helvetica, sans-serif" font-size="8.5" font-style="italic" fill="#0f1828">Chip architects · ML researchers · LLM engineers · EDA · compiler engineers</text>
   </g>
   <g id="text_3">
    <text x="101.65" y="160.04" font-family="Arial, Helvetica, sans-serif" font-size="7.5" fill="#4a5567">Bengaluru · Hyderabad · Noida · Pune</text>
   </g>
   <g id="text_4">
    <text x="413.27" y="144.48" font-family="Arial, Helvetica, sans-serif" font-size="8.0" fill="#0f1828">~60k semi designers + ~100–150k AI design engineers</text>
   </g>
   <g id="text_5">
    <text x="101.65" y="207.72" font-family="Arial, Helvetica, sans-serif" font-size="12.0" fill="#0f1828">INFRASTRUCTURE</text>
   </g>
   <g id="text_6">
    <text x="101.65" y="226.57" font-family="Arial, Helvetica, sans-serif" font-size="8.5" font-style="italic" fill="#0f1828">DC engineers · MEP · MLOps · AIOps · cloud-native · cybersecurity</text>
   </g>
   <g id="text_7">
    <text x="101.65" y="243.20" font-family="Arial, Helvetica, sans-serif" font-size="7.5" fill="#4a5567">All seven corridors</text>
   </g>
   <g id="text_8">
    <text x="453.34" y="227.64" font-family="Arial, Helvetica, sans-serif" font-size="8.0" fill="#0f1828">~200–300k today → 700k–1M by 2030</text>
   </g>
   <g id="text_9">
