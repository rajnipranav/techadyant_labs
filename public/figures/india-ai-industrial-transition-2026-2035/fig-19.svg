   </g>
   <g id="text_10">
    <text x="101.65" y="309.73" font-family="Arial, Helvetica, sans-serif" font-size="8.5" font-style="italic" fill="#0f1828">Industrial-AI · healthcare-AI · BFSI-AI · retail-AI · ag-AI · ed-tech</text>
   </g>
   <g id="text_11">
    <text x="101.65" y="326.36" font-family="Arial, Helvetica, sans-serif" font-size="7.5" fill="#4a5567">Distributed nationally</text>
   </g>
   <g id="text_12">
    <text x="461.56" y="310.80" font-family="Arial, Helvetica, sans-serif" font-size="8.0" fill="#0f1828">~500–800k today → 2–3M by 2030</text>
   </g>
   <g id="text_13">
