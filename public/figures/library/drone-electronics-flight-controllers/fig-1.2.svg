<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 932" width="1600" height="932">
<rect x="0" y="0" width="1600" height="932" fill="#FBF9F4"/>
<text x="46.0" y="56.0" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#0F1828" text-anchor="start">Five-point action plan for stakeholders</text>
<text x="46.0" y="84.0" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#4A5567" text-anchor="start">Cross-cutting priorities, 2026–2028</text>
<rect x="46.0" y="98.0" width="64.0" height="4.0" rx="0" fill="#C9A84C"/>
<text x="1554.0" y="40.0" font-family="Arial, Helvetica, sans-serif" font-size="12.5" font-weight="500" fill="#4A5567" text-anchor="end">Figure 1.2 · Techadyant Labs · 2026</text>
<rect x="46.0" y="128.0" width="1508.0" height="136.0" rx="8" fill="#FFFFFF" stroke="#D9D4C8" stroke-width="1.4"/>
<circle cx="110.0" cy="196.0" r="38.0" fill="#0F1828" opacity="1"/>
<text x="110.0" y="208.0" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="40" font-weight="700" fill="#C9A84C" text-anchor="middle">1</text>
<text x="180.0" y="172.0" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#0F1828" text-anchor="start">Accelerate FC localisation</text>
<text x="180.0" y="204.0" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#4A5567" text-anchor="start">The 40% localisation target by FY2027-28 is non-negotiable. OEMs must redesign supply chains now — partner with Zuppa</text>
<text x="180.0" y="226.0" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#4A5567" text-anchor="start">or Yaanendriya, or build in-house.</text>
<rect x="46.0" y="278.0" width="1508.0" height="136.0" rx="8" fill="#FFFFFF" stroke="#D9D4C8" stroke-width="1.4"/>
<circle cx="110.0" cy="346.0" r="38.0" fill="#0F1828" opacity="1"/>
<text x="110.0" y="358.0" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="40" font-weight="700" fill="#C9A84C" text-anchor="middle">2</text>
<text x="180.0" y="322.0" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#0F1828" text-anchor="start">Invest in GPS-denied navigation</text>
<text x="180.0" y="354.0" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#4A5567" text-anchor="start">Operation Sindoor proved jamming and spoofing are real threats. Defence prioritises EW-resilient autonomy. Tsalla and</text>
<text x="180.0" y="376.0" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#4A5567" text-anchor="start">Zuppa lead; more entrants needed.</text>
<rect x="46.0" y="428.0" width="1508.0" height="136.0" rx="8" fill="#FFFFFF" stroke="#D9D4C8" stroke-width="1.4"/>
<circle cx="110.0" cy="496.0" r="38.0" fill="#0F1828" opacity="1"/>
<text x="110.0" y="508.0" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="40" font-weight="700" fill="#C9A84C" text-anchor="middle">3</text>
<text x="180.0" y="472.0" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#0F1828" text-anchor="start">Bridge the AI credibility gap</text>
<text x="180.0" y="504.0" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#4A5567" text-anchor="start">89% of startups claim AI integration, but certified operational solutions are scarce. Focus on validation, testing and</text>
<text x="180.0" y="526.0" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#4A5567" text-anchor="start">defence certification to convert claims into contracts.</text>
<rect x="46.0" y="578.0" width="1508.0" height="136.0" rx="8" fill="#FFFFFF" stroke="#D9D4C8" stroke-width="1.4"/>
<circle cx="110.0" cy="646.0" r="38.0" fill="#0F1828" opacity="1"/>
<text x="110.0" y="658.0" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="40" font-weight="700" fill="#C9A84C" text-anchor="middle">4</text>
<text x="180.0" y="622.0" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#0F1828" text-anchor="start">Prepare for BVLOS autonomy</text>
<text x="180.0" y="654.0" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#4A5567" text-anchor="start">Commercial BVLOS approval (expected 2027-2028) will mandate sense-and-avoid. Develop or partner for</text>
<text x="180.0" y="676.0" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#4A5567" text-anchor="start">collision-avoidance systems (Inferigence Chetas model).</text>
<rect x="46.0" y="728.0" width="1508.0" height="136.0" rx="8" fill="#FFFFFF" stroke="#D9D4C8" stroke-width="1.4"/>
<circle cx="110.0" cy="796.0" r="38.0" fill="#0F1828" opacity="1"/>
<text x="110.0" y="808.0" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="40" font-weight="700" fill="#C9A84C" text-anchor="middle">5</text>
<text x="180.0" y="772.0" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#0F1828" text-anchor="start">Leverage the Army 515 WS pathway</text>
<text x="180.0" y="804.0" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#4A5567" text-anchor="start">The Army&#x27;s 515 Base Workshop MoUs provide a structured route from development to procurement. Autonomy startups should</text>
<text x="180.0" y="826.0" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#4A5567" text-anchor="start">engage with this model.</text>
<line x1="46.0" y1="892.0" x2="1554.0" y2="892.0" stroke="#D9D4C8" stroke-width="1" opacity="1"/>
<text x="46.0" y="914.0" font-family="Arial, Helvetica, sans-serif" font-size="11.5" font-weight="400" fill="#4A5567" text-anchor="start">Source: Techadyant Labs synthesis of policy, defence and market findings.  Techadyant Labs analysis.</text>
</svg>