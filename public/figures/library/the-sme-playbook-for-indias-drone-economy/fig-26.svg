ns-serif" font-size="15.5" font-weight="400" fill="#E8E5DD" text-anchor="start">high-volume yet seasonal and</text><text x="1256.0" y="372.0" font-family="Arial, Helvetica, sans-serif" font-size="15.5" font-weight="400" fill="#E8E5DD" text-anchor="start">margin-compressed by</text><text x="1256.0" y="395.0" font-family="Arial, Helvetica, sans-serif" font-size="15.5" font-weight="400" fill="#E8E5DD" text-anchor="start">government-subsidised pricing.</text><line x1="56.0" y1="614.0" x2="1544.0" y2="614.0" stroke="#4A5567" stroke-width="1" opacity="0.25"/><text x="56.0" y="642.0" font-family="Arial, Helvetica, sans-serif" font-size="15.5" font-weight="400" fill="#4A5567" text-anchor="start">Source: Techadyant Labs fleet-operations economics (Chapter 6).</text><text x="1544.0" y="642.0" font-family="Arial, Helvetica, sans-serif" font-size="15.5" font-weight="600" fill="#C9A84C" text-anchor="end" font-style="italic">Indicative</text></svg>