<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 820" font-family="Arial, Helvetica, sans-serif"><defs><marker id="ar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#4A5567"/></marker><marker id="arb" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#C9A84C"/></marker></defs><rect x="0.0" y="0.0" width="1600.0" height="820.0" rx="0" fill="#FBF9F4"/><rect x="56.0" y="46.0" width="90.0" height="5.0" rx="0" fill="#C9A84C"/><text x="56.0" y="86.0" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700" fill="#0F1828" text-anchor="start">A phased path to the full INR 5 crore</text><text x="56.0" y="120.0" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#4A5567" text-anchor="start">Sequence low-capital, quick-payback segments first; fund high-barrier plays from cash flow</text><text x="1544.0" y="60.0" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="600" fill="#4A5567" text-anchor="end" letter-spacing="1.5">TECHADYANT LABS</text><line x1="56.0" y1="144.0" x2="1544.0" y2="144.0" stroke="#4A5567" stroke-width="1" opacity="0.25"/><rect x="56.0" y="178.0" width="478.7" height="52.0" rx="8" fill="#2BC5B4"/><text x="76.0" y="202.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#FBF9F4" text-anchor="start">PHASE 1 · Year 1</text><text x="76.0" y="222.0" font-family="Arial, Helvetica, sans-serif" font-size="14.5" font-weight="400" fill="#E8E5DD" text-anchor="start">Low capital · quick payback</text><text x="516.7" y="206.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#FBF9F4" text-anchor="end">INR 1–1.5 Cr</text><rect x="56.0" y="248.0" width="478.7" height="104.0" rx="8" fill="#FBF9F4" stroke="rgba(43,197,180,0.5)" stroke-width="1.5"/><rect x="56.0" y="248.0" width="7.0" height="104.0" rx="0" fill="#2BC5B4"/><text x="80.0" y="282.0" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#0F1828" text-anchor="start">MRO</text><text x="80.0" y="310.0" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#4A5567" text-anchor="start">12–18 mo payback; recurring revenue</text><rect x="56.0" y="366.0" width="478.7" height="104.0" rx="8" fill="#FBF9F4" stroke="rgba(43,197,180,0.5)" stroke-width="1.5"/><rect x="56.0" y="366.0" width="7.0" height="104.0" rx="0" fill="#2BC5B4"/><text x="80.0" y="400.0" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#0F1828" text-anchor="start">Training</text><text x="80.0" y="428.0" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#4A5567" text-anchor="start">DGCA RPTO = 10-year moat</text><rect x="56.0" y="484.0" width="478.7" height="104.0" rx="8" fill="#FBF9F4" stroke="rgba(43,197,180,0.5)" stroke-width="1.5"/><rect x="56.0" y="484.0" width="7.0" height="104.0" rx="0" fill="#2BC5B4"/><text x="80.0" y="518.0" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#0F1828" text-anchor="start">Inspection Services</text><text x="80.0" y="546.0" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#4A5567" text-anchor="start">Enterprise clients build credibility</text><line x1="538.6666666666667" y1="382" x2="556.6666666666667" y2="382" stroke="#4A5567" stroke-width="3" marker-end="url(#ar)"/><rect x="560.7" y="178.0" width="478.7" height="52.0" rx="8" fill="#C9A84C"/><text x="580.7" y="202.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#0F1828" text-anchor="start">PHASE 2 · Year 2–3</text><text x="580.7" y="222.0" font-family="Arial, Helvetica, sans-serif" font-size="14.5" font-weight="400" fill="#0F1828" text-anchor="start">Scale and diversify</text><text x="1021.3" y="206.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#0F1828" text-anchor="end">INR 1.5–2 Cr</text><rect x="560.7" y="248.0" width="478.7" height="104.0" rx="8" fill="#FBF9F4" stroke="rgba(201,168,76,0.5)" stroke-width="1.5"/><rect x="560.7" y="248.0" width="7.0" height="104.0" rx="0" fill="#C9A84C"/><text x="584.7" y="282.0" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#0F1828" text-anchor="start">Fleet Operations</text><text x="584.7" y="310.0" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#4A5567" text-anchor="start">Scale on contract wins; agri +</text><text x="584.7" y="331.0" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#4A5567" text-anchor="start">logistics</text><rect x="560.7" y="366.0" width="478.7" height="104.0" rx="8" fill="#FBF9F4" stroke="rgba(201,168,76,0.5)" stroke-width="1.5"/><rect x="560.7" y="366.0" width="7.0" height="104.0" rx="0" fill="#C9A84C"/><text x="584.7" y="400.0" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#0F1828" text-anchor="start">Software</text><text x="584.7" y="428.0" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#4A5567" text-anchor="start">Build MVP; SaaS recurring model</text><line x1="1043.3333333333335" y1="382" x2="1061.3333333333335" y2="382" stroke="#4A5567" stroke-width="3" marker-end="url(#ar)"/><rect x="1065.3" y="178.0" width="478.7" height="52.0" rx="8" fill="#0F1828"/><text x="1085.3" y="202.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#FBF9F4" text-anchor="start">PHASE 3 · Year 3–5</text><text x="1085.3" y="222.0" font-family="Arial, Helvetica, sans-serif" font-size="14.5" font-weight="400" fill="#E8E5DD" text-anchor="start">High-capital strategic plays</text><text x="1526.0" y="206.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#FBF9F4" text-anchor="end">INR 1.5–2 Cr</text><rect x="1065.3" y="248.0" width="478.7" height="104.0" rx="8" fill="#FBF9F4" stroke="rgba(15,24,40,0.5)" stroke-width="1.5"/><rect x="1065.3" y="248.0" width="7.0" height="104.0" rx="0" fill="#0F1828"/><text x="1089.3" y="282.0" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#0F1828" text-anchor="start">Manufacturing</text><text x="1089.3" y="310.0" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#4A5567" text-anchor="start">PLI incentives; 40% localisation by</text><text x="1089.3" y="331.0" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#4A5567" text-anchor="start">FY28</text><rect x="1065.3" y="366.0" width="478.7" height="104.0" rx="8" fill="#FBF9F4" stroke="rgba(15,24,40,0.5)" stroke-width="1.5"/><rect x="1065.3" y="366.0" width="7.0" height="104.0" rx="0" fill="#0F1828"/><text x="1089.3" y="400.0" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#0F1828" text-anchor="start">Payload Systems</text><text x="1089.3" y="428.0" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#4A5567" text-anchor="start">RDI Fund grants; defence modernisation</text><text x="56.0" y="734.0" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#4A5567" text-anchor="start" font-style="italic">Revenue from each phase funds the next — risk and capital intensity rise only as experience and cash flow grow.</text><line x1="56.0" y1="754.0" x2="1544.0" y2="754.0" stroke="#4A5567" stroke-width="1" opacity="0.25"/><text x="56.0" y="782.0" font-family="Arial, Helvetica, sans-serif" font-size="15.5" font-weight="400" fill="#4A5567" text-anchor="start">Source: Techadyant Labs phased entry strategy (Chapters 3 &amp; 12).</text></svg>