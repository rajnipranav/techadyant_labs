    <text class="st21" transform="translate(117.86 457.6)"><tspan x="0" y="0">To operationalize massed, coordinated drone warfare at the operational and strategic</tspan></text>
    <text class="st21" transform="translate(117.86 476.12)"><tspan x="0" y="0">levels, the Indian Army is raising a completely new formation type: the &quot;Shaktibaan&quot;</tspan></text>
    <text class="st21" transform="translate(117.86 494.64)"><tspan x="0" y="0">(Corps of Power/Strike) Regiment. This is not a traditional artillery or infantry unit</tspan></text>
