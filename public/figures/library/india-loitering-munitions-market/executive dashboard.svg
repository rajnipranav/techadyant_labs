<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="100%" height="100%">
  <defs>
    <!-- Modern card shadow filter for Adobe Illustrator compatibility -->
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.04" />
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000000" flood-opacity="0.06" />
    </filter>

    <!-- Background grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#E2E8F0" stroke-width="0.5" />
    </pattern>

    <!-- Gradients for Budget by Phase bars -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3498DB" />
      <stop offset="100%" stop-color="#2980B9" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E67E22" />
      <stop offset="100%" stop-color="#D35400" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2ECC71" />
      <stop offset="100%" stop-color="#27AE60" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="800" fill="#F8FAFC" />
  <rect width="1000" height="800" fill="url(#grid)" />

  <!-- Main Title -->
  <text x="500" y="40" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="24" font-weight="bold" fill="#1E293B" text-anchor="middle" letter-spacing="1">Executive Summary Dashboard - Demand Blueprint 2026-2035</text>

  <!-- ==================== ROW 1: KPI CARDS ==================== -->

  <!-- Card 1: Total Demand -->
  <g id="kpi-demand">
    <rect x="40" y="80" width="440" height="100" rx="10" fill="#FFFFFF" filter="url(#shadow)" />
    <rect x="40" y="80" width="440" height="100" rx="10" fill="none" stroke="#E2E8F0" stroke-width="1" />
    <text x="260" y="115" font-family="system-ui, sans-serif" font-size="16" fill="#64748B" text-anchor="middle" font-weight="500">Total Demand</text>
    <text x="260" y="155" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#0F172A" text-anchor="middle">397,000 Units</text>
  </g>

  <!-- Card 2: Total Budget -->
  <g id="kpi-budget">
    <rect x="520" y="80" width="440" height="100" rx="10" fill="#FFFFFF" filter="url(#shadow)" />
    <rect x="520" y="80" width="440" height="100" rx="10" fill="none" stroke="#E2E8F0" stroke-width="1" />
    <text x="740" y="115" font-family="system-ui, sans-serif" font-size="16" fill="#64748B" text-anchor="middle" font-weight="500">Total Budget</text>
    <text x="740" y="155" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#0F172A" text-anchor="middle">INR 55,000 Cr</text>
  </g>

  <!-- ==================== ROW 2: CHARTS ==================== -->

  <!-- Card 3: Distribution by Category -->
  <g id="chart-distribution">
    <rect x="40" y="210" width="440" height="240" rx="10" fill="#FFFFFF" filter="url(#shadow)" />
    <rect x="40" y="210" width="440" height="240" rx="10" fill="none" stroke="#E2E8F0" stroke-width="1" />
    <text x="260" y="245" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#1E293B" text-anchor="middle">Distribution by Category</text>

    <!-- FPV -->
    <text x="105" y="292" font-family="system-ui, sans-serif" font-size="14" fill="#475569" text-anchor="end" font-weight="600">FPV</text>
    <rect x="120" y="275" width="220" height="24" rx="4" fill="#E74C3C" />
    <text x="350" y="293" font-family="system-ui, sans-serif" font-size="14" fill="#E74C3C" text-anchor="start" font-weight="bold">63.0%</text>

    <!-- Attritable -->
    <text x="105" y="332" font-family="system-ui, sans-serif" font-size="14" fill="#475569" text-anchor="end" font-weight="600">Attritable</text>
    <rect x="120" y="315" width="88" height="24" rx="4" fill="#F1C40F" />
    <text x="218" y="333" font-family="system-ui, sans-serif" font-size="14" fill="#F1C40F" text-anchor="start" font-weight="bold">25.2%</text>

    <!-- Short Range -->
    <text x="105" y="372" font-family="system-ui, sans-serif" font-size="14" fill="#475569" text-anchor="end" font-weight="600">Short Range</text>
    <rect x="120" y="355" width="27" height="24" rx="4" fill="#1ABC9C" />
    <text x="157" y="373" font-family="system-ui, sans-serif" font-size="14" fill="#1ABC9C" text-anchor="start" font-weight="bold">7.6%</text>

    <!-- Medium Range -->
    <text x="105" y="412" font-family="system-ui, sans-serif" font-size="14" fill="#475569" text-anchor="end" font-weight="600">Medium Range</text>
    <rect x="120" y="395" width="9" height="24" rx="4" fill="#2ECC71" />
    <text x="139" y="413" font-family="system-ui, sans-serif" font-size="14" fill="#2ECC71" text-anchor="start" font-weight="bold">2.5%</text>

    <!-- Swarm -->
    <text x="105" y="452" font-family="system-ui, sans-serif" font-size="14" fill="#475569" text-anchor="end" font-weight="600">Swarm</text>
    <rect x="120" y="435" width="15" height="24" rx="4" fill="#3498DB" />
    <text x="145" y="453" font-family="system-ui, sans-serif" font-size="14" fill="#3498DB" text-anchor="start" font-weight="bold">1.5%</text>
  </g>

  <!-- Card 4: Critical Import Dependencies -->
  <g id="chart-imports">
    <rect x="520" y="210" width="440" height="240" rx="10" fill="#FFFFFF" filter="url(#shadow)" />
    <rect x="520" y="210" width="440" height="240" rx="10" fill="none" stroke="#E2E8F0" stroke-width="1" />
    <text x="740" y="245" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#1E293B" text-anchor="middle">Critical Import Dependencies</text>

    <!-- Turbine -->
    <text x="545" y="292" font-family="system-ui, sans-serif" font-size="14" fill="#475569" text-anchor="end" font-weight="600">Turbine</text>
    <rect x="560" y="275" width="260" height="24" rx="4" fill="#E74C3C" />
    <text x="830" y="293" font-family="system-ui, sans-serif" font-size="14" fill="#E74C3C" text-anchor="start" font-weight="bold">65%</text>

    <!-- Thermal -->
    <text x="545" y="332" font-family="system-ui, sans-serif" font-size="14" fill="#475569" text-anchor="end" font-weight="600">Thermal</text>
    <rect x="560" y="315" width="240" height="24" rx="4" fill="#E67E22" />
    <text x="810" y="333" font-family="system-ui, sans-serif" font-size="14" fill="#E67E22" text-anchor="start" font-weight="bold">60%</text>

    <!-- AI -->
    <text x="545" y="372" font-family="system-ui, sans-serif" font-size="14" fill="#475569" text-anchor="end" font-weight="600">AI</text>
    <rect x="560" y="355" width="300" height="24" rx="4" fill="#E74C3C" />
    <text x="870" y="373" font-family="system-ui, sans-serif" font-size="14" fill="#E74C3C" text-anchor="start" font-weight="bold">75%</text>

    <!-- Magnets -->
    <text x="545" y="412" font-family="system-ui, sans-serif" font-size="14" fill="#475569" text-anchor="end" font-weight="600">Magnets</text>
    <rect x="560" y="395" width="360" height="24" rx="4" fill="#C0392B" />
    <text x="930" y="413" font-family="system-ui, sans-serif" font-size="14" fill="#C0392B" text-anchor="start" font-weight="bold">100%</text>

    <!-- FC -->
    <text x="545" y="452" font-family="system-ui, sans-serif" font-size="14" fill="#475569" text-anchor="end" font-weight="600">FC</text>
    <rect x="560" y="435" width="324" height="24" rx="4" fill="#E74C3C" />
    <text x="895" y="453" font-family="system-ui, sans-serif" font-size="14" fill="#E74C3C" text-anchor="start" font-weight="bold">90%</text>
  </g>

  <!-- ==================== ROW 3: BUDGET & TIMELINE ==================== -->

  <!-- Card 5: Budget by Phase -->
  <g id="chart-budget">
    <rect x="40" y="480" width="440" height="240" rx="10" fill="#FFFFFF" filter="url(#shadow)" />
    <rect x="40" y="480" width="440" height="240" rx="10" fill="none" stroke="#E2E8F0" stroke-width="1" />
    <text x="260" y="515" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#1E293B" text-anchor="middle">Budget by Phase</text>

    <!-- Phase I -->
    <text x="105" y="562" font-family="system-ui, sans-serif" font-size="14" fill="#475569" text-anchor="end" font-weight="600">Phase I</text>
    <rect x="120" y="545" width="320" height="30" rx="6" fill="url(#blueGrad)" />
    <text x="280" y="566" font-family="system-ui, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">INR 22,000 Cr</text>

    <!-- Phase II -->
    <text x="105" y="612" font-family="system-ui, sans-serif" font-size="14" fill="#475569" text-anchor="end" font-weight="600">Phase II</text>
    <rect x="120" y="595" width="280" height="30" rx="6" fill="url(#orangeGrad)" />
    <text x="260" y="616" font-family="system-ui, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">INR 19,250 Cr</text>

    <!-- Phase III -->
    <text x="105" y="662" font-family="system-ui, sans-serif" font-size="14" fill="#475569" text-anchor="end" font-weight="600">Phase III</text>
    <rect x="120" y="645" width="200" height="30" rx="6" fill="url(#greenGrad)" />
    <text x="220" y="666" font-family="system-ui, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">INR 13,750 Cr</text>
  </g>

  <!-- Card 6: Strategic Timeline -->
  <g id="chart-timeline">
    <rect x="520" y="480" width="440" height="240" rx="10" fill="#FFFFFF" filter="url(#shadow)" />
    <rect x="520" y="480" width="440" height="240" rx="10" fill="none" stroke="#E2E8F0" stroke-width="1" />
    <text x="740" y="515" font-family="system-ui, sans-serif" font-size="18" font-weight="bold" fill="#1E293B" text-anchor="middle">Strategic Timeline</text>

    <!-- Timeline Base Line -->
    <line x1="560" y1="610" x2="920" y2="610" stroke="#CBD5E1" stroke-width="4" stroke-linecap="round" />

    <!-- 2026 Milestone -->
    <g id="milestone-2026">
      <circle cx="580" cy="610" r="10" fill="#3498DB" stroke="#FFFFFF" stroke-width="3" />
      <text x="580" y="590" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1E293B" text-anchor="middle">2026</text>
      <line x1="580" y1="620" x2="580" y2="635" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="2,2" />
      <text x="580" y="650" font-family="system-ui, sans-serif" font-size="12" fill="#64748B" text-anchor="middle" font-weight="500">Phase I Start</text>
    </g>

    <!-- 2028 Milestone -->
    <g id="milestone-2028">
      <circle cx="680" cy="610" r="10" fill="#3498DB" stroke="#FFFFFF" stroke-width="3" />
      <text x="680" y="590" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1E293B" text-anchor="middle">2028</text>
      <line x1="680" y1="620" x2="680" y2="635" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="2,2" />
      <text x="680" y="650" font-family="system-ui, sans-serif" font-size="12" fill="#64748B" text-anchor="middle" font-weight="500">Shaktibaan Complete</text>
    </g>

    <!-- 2031 Milestone -->
    <g id="milestone-2031">
      <circle cx="800" cy="610" r="10" fill="#3498DB" stroke="#FFFFFF" stroke-width="3" />
      <text x="800" y="590" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1E293B" text-anchor="middle">2031</text>
      <line x1="800" y1="620" x2="800" y2="635" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="2,2" />
      <text x="800" y="650" font-family="system-ui, sans-serif" font-size="12" fill="#64748B" text-anchor="middle" font-weight="500">Phase II Complete</text>
    </g>

    <!-- 2035 Milestone -->
    <g id="milestone-2035">
      <circle cx="900" cy="610" r="10" fill="#3498DB" stroke="#FFFFFF" stroke-width="3" />
      <text x="900" y="590" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1E293B" text-anchor="middle">2035</text>
      <line x1="900" y1="620" x2="900" y2="635" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="2,2" />
      <text x="900" y="650" font-family="system-ui, sans-serif" font-size="12" fill="#64748B" text-anchor="middle" font-weight="500">Full Maturity</text>
    </g>
  </g>
</svg>