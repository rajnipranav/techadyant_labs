  <text class="st8" transform="translate(15.67 31.55)"><tspan x="0" y="0">The four-layer Talent Stack — India</tspan></text>
  <text class="st13" transform="translate(15.22 53.6)"><tspan x="0" y="0">Each layer has distinct demand dynamics, education requirements and policy levers</tspan></text>
