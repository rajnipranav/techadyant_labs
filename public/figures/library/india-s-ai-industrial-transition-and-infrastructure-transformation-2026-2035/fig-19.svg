  <text class="st12" transform="translate(101.65 124.56)"><tspan x="0" y="0">DESIGN</tspan></text>
  <text class="st7" transform="translate(101.65 143.41)"><tspan x="0" y="0">Chip architects · ML researchers · LLM engineers · EDA · compiler engineers</tspan></text>
  <text class="st10" transform="translate(101.65 160.04)"><tspan x="0" y="0">Bengaluru · Hyderabad · Noida · Pune</tspan></text>
  <text class="st1" transform="translate(413.27 144.48)"><tspan x="0" y="0">~60k semi designers + ~100–150k AI design engineers</tspan></text>
  <text class="st12" transform="translate(101.65 207.72)"><tspan x="0" y="0">INFRASTRUCTURE</tspan></text>
  <text class="st7" transform="translate(101.65 226.57)"><tspan x="0" y="0">DC engineers · MEP · MLOps · AIOps · cloud-native · cybersecurity</tspan></text>
  <text class="st10" transform="translate(101.65 243.2)"><tspan x="0" y="0">All seven corridors</tspan></text>
  <text class="st1" transform="translate(453.34 227.64)"><tspan x="0" y="0">~200–300k today → 700k–1M by 2030</tspan></text>
  <text class="st12" transform="translate(101.65 290.88)"><tspan x="0" y="0">APPLICATION</tspan></text>
  <text class="st7" transform="translate(101.65 309.73)"><tspan x="0" y="0">Industrial-AI · healthcare-AI · BFSI-AI · retail-AI · ag-AI · ed-tech</tspan></text>
  <text class="st10" transform="translate(101.65 326.36)"><tspan x="0" y="0">Distributed nationally</tspan></text>
  <text class="st1" transform="translate(461.56 310.8)"><tspan x="0" y="0">~500–800k today → 2–3M by 2030</tspan></text>
  <text class="st12" transform="translate(101.65 374.04)"><tspan x="0" y="0">GOVERNANCE</tspan></text>
  <text class="st7" transform="translate(101.65 392.89)"><tspan x="0" y="0">AI ethics · policy · risk · audit · safety · regulatory affairs</tspan></text>
  <text class="st10" transform="translate(101.65 409.52)"><tspan x="0" y="0">NCR · Bengaluru · Mumbai (concentrated)</tspan></text>
  <text class="st1" transform="translate(442.55 393.96)"><tspan x="0" y="0">Low thousands today → 100–200k by 2030</tspan></text>
