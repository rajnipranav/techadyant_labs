<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 560" width="1180" height="560"><rect width="1180" height="560" fill="#FBF9F4"/><rect x="40" y="34" width="80" height="5" fill="#C9A84C"/><text x="40" y="72" font-family="Arial, Helvetica, sans-serif" font-size="25" fill="#0F1828" font-weight="700" text-anchor="start">The deepening: SAP's product evolution, 1972–2027</text><text x="40" y="95" font-family="Arial, Helvetica, sans-serif" font-size="13.5" fill="#4A5567" text-anchor="start">Each generation bound the customer tighter — culminating in the cloud subscription and the 2027 ECC support cliff.</text><text x="1140" y="46" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#4A5567" letter-spacing="0.5" text-anchor="end">Figure 5.2 · Techadyant Labs · 2026</text><line x1="40" y1="518" x2="1140" y2="518" stroke="#E8E5DD" stroke-width="1.5"/><text x="40" y="538" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#4A5567" text-anchor="start">Source: SAP corporate history; SAP product documentation.</text><line x1="110" y1="300" x2="1050" y2="300" stroke="#0F1828" stroke-width="2.5"/><path d="M1050 300 l-10 -5 l0 10 z" fill="#0F1828"/><circle cx="150" cy="300" r="8" fill="#0F1828"/><line x1="150" y1="292" x2="150" y2="254" stroke="#0F1828" stroke-width="1.5"/><text x="150" y="228" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#0F1828" font-weight="700" text-anchor="middle">1972</text><text x="150" y="248" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#0F1828" font-weight="700" text-anchor="middle">SAP founded</text><text x="150" y="208" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#0F1828" text-anchor="start"></text><text x="150" y="208" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#0F1828" text-anchor="start"></text><text x="150" y="208" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#4A5567" text-anchor="middle">Mannheim, Germany</text><circle cx="320" cy="300" r="8" fill="#0F1828"/><line x1="320" y1="308" x2="320" y2="344" stroke="#0F1828" stroke-width="1.5"/><text x="320" y="364" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#0F1828" font-weight="700" text-anchor="middle">1979</text><text x="320" y="384" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#0F1828" font-weight="700" text-anchor="middle">R/2</text><text x="320" y="404" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#4A5567" text-anchor="middle">mainframe ERP</text><circle cx="490" cy="300" r="8" fill="#0F1828"/><line x1="490" y1="292" x2="490" y2="254" stroke="#0F1828" stroke-width="1.5"/><text x="490" y="228" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#0F1828" font-weight="700" text-anchor="middle">1992</text><text x="490" y="248" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#0F1828" font-weight="700" text-anchor="middle">R/3</text><text x="490" y="208" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#0F1828" text-anchor="start"></text><text x="490" y="208" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#0F1828" text-anchor="start"></text><text x="490" y="208" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#4A5567" text-anchor="middle">client–server; the global standard</text><circle cx="660" cy="300" r="8" fill="#C8443B"/><line x1="660" y1="308" x2="660" y2="344" stroke="#C8443B" stroke-width="1.5"/><text x="660" y="364" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#C8443B" font-weight="700" text-anchor="middle">2004</text><text x="660" y="384" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#0F1828" font-weight="700" text-anchor="middle">ECC</text><text x="660" y="404" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#4A5567" text-anchor="middle">ERP Central Component — the installed base</text><circle cx="830" cy="300" r="8" fill="#0F1828"/><line x1="830" y1="292" x2="830" y2="254" stroke="#0F1828" stroke-width="1.5"/><text x="830" y="228" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#0F1828" font-weight="700" text-anchor="middle">2015</text><text x="830" y="248" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#0F1828" font-weight="700" text-anchor="middle">S/4HANA</text><text x="830" y="208" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#0F1828" text-anchor="start"></text><text x="830" y="208" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#0F1828" text-anchor="start"></text><text x="830" y="208" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#4A5567" text-anchor="middle">in-memory; the migration target</text><circle cx="1010" cy="300" r="8" fill="#1A8A7D"/><line x1="1010" y1="308" x2="1010" y2="344" stroke="#1A8A7D" stroke-width="1.5"/><text x="1010" y="364" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#1A8A7D" font-weight="700" text-anchor="middle">2022</text><text x="1010" y="384" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#0F1828" font-weight="700" text-anchor="middle">RISE with SAP</text><text x="1010" y="404" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#4A5567" text-anchor="middle">cloud subscription — perpetual rent</text><rect x="600" y="150" width="430" height="34" rx="7" fill="#C8443B" fill-opacity="0.14" stroke="#C8443B" stroke-width="1.2"/><text x="815" y="172" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#C8443B" font-weight="700" text-anchor="middle">ECC mainstream support ends 31 Dec 2027 — the forced-migration trigger</text><text x="110" y="510" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#0F1828" font-style="italic" text-anchor="start">The arc runs from owned, on-premise software (1972–2004) to perpetual cloud subscription (2022– ) — each step raising the cost of leaving.</text></svg>