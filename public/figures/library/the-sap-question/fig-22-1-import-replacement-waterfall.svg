<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 580" width="1180" height="580"><rect width="1180" height="580" fill="#FBF9F4"/><rect x="40" y="34" width="80" height="5" fill="#C9A84C"/><text x="40" y="72" font-family="Arial, Helvetica, sans-serif" font-size="25" fill="#0F1828" font-weight="700" text-anchor="start">From foreign spend to replaceable spend</text><text x="40" y="95" font-family="Arial, Helvetica, sans-serif" font-size="13.5" fill="#4A5567" text-anchor="start">Sizing the import-replacement prize, in USD billion per year. Each step narrows to what is realistically substitutable.</text><text x="1140" y="46" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#4A5567" letter-spacing="0.5" text-anchor="end">Figure 22.1 · Techadyant Labs · 2026</text><text x="120" y="138" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#0F1828" font-weight="700" text-anchor="start">≈ $7.4 bn / year replaceable foreign-software spend — recovered against a ~$8 bn five-year mission cost.</text><rect x="120" y="193" width="180" height="277" rx="6" fill="#4A5567" fill-opacity="0.82"/><text x="210.0" y="181.36" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#4A5567" font-weight="700" text-anchor="middle">$24.7bn</text><text x="210.0" y="494" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#0F1828" font-weight="700" text-anchor="middle">Enterprise-software</text><text x="210.0" y="511" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#0F1828" font-weight="700" text-anchor="middle">market</text><path d="M 300 474 L 380 474" stroke="#4A5567" stroke-width="1.5" stroke-dasharray="4 3"/><path d="M 374 469 L 380 474 L 374 479" fill="#4A5567"/><rect x="380" y="263" width="180" height="207" rx="6" fill="#C8443B" fill-opacity="0.82"/><text x="470.0" y="250.8" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#C8443B" font-weight="700" text-anchor="middle">$18.5bn</text><text x="470.0" y="494" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#0F1828" font-weight="700" text-anchor="middle">Foreign-controlled</text><path d="M 560 474 L 640 474" stroke="#4A5567" stroke-width="1.5" stroke-dasharray="4 3"/><path d="M 634 469 L 640 474 L 634 479" fill="#4A5567"/><rect x="640" y="356" width="180" height="114" rx="6" fill="#C9A84C" fill-opacity="0.82"/><rect x="640" y="356" width="180" height="63" rx="6" fill="#C9A84C" fill-opacity="0.28"/><text x="730.0" y="436.48" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F1828" font-weight="700" text-anchor="middle">4.6</text><text x="730.0" y="343.76" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#C9A84C" font-weight="700" text-anchor="middle">$4.6–10.2bn</text><text x="730.0" y="494" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#0F1828" font-weight="700" text-anchor="middle">Replaceable</text><text x="730.0" y="511" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#0F1828" font-weight="700" text-anchor="middle">(25–55% band)</text><path d="M 820 474 L 900 474" stroke="#4A5567" stroke-width="1.5" stroke-dasharray="4 3"/><path d="M 894 469 L 900 474 L 894 479" fill="#4A5567"/><rect x="900" y="387" width="180" height="83" rx="6" fill="#1A8A7D" fill-opacity="0.82"/><text x="990.0" y="375.12" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#1A8A7D" font-weight="700" text-anchor="middle">$7.4bn</text><text x="990.0" y="494" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#0F1828" font-weight="700" text-anchor="middle">Central estimate</text><line x1="110" y1="474" x2="1090" y2="474" stroke="#0F1828" stroke-width="2"/><line x1="40" y1="538" x2="1140" y2="538" stroke="#E8E5DD" stroke-width="1.5"/><text x="40" y="558" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#4A5567" text-anchor="start">Source: Techadyant Labs import-replacement model (see Appendix F).</text><text x="1140" y="