<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 560" width="1180" height="560"><rect width="1180" height="560" fill="#FBF9F4"/><rect x="40" y="34" width="80" height="5" fill="#C9A84C"/><text x="40" y="72" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#0F1828" font-weight="700" text-anchor="start">When software became a sanction</text><text x="40" y="96" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#4A5567" text-anchor="start">The 2022 withdrawal of Western enterprise software from Russia — the precedent at the centre of this report.</text><text x="1140" y="46" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#4A5567" letter-spacing="0.5" text-anchor="end">Figure F.1 · Techadyant Labs · 2026</text><line x1="40" y1="516" x2="1140" y2="516" stroke="#E8E5DD" stroke-width="1.5"/><text x="40" y="536" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#4A5567" text-anchor="start">Source: company statements, contemporaneous reporting (2022). Techadyant Labs analysis.</text><line x1="90" y1="300" x2="1090" y2="300" stroke="#0F1828" stroke-width="2.5"/><circle cx="150" cy="300" r="8" fill="#C8443B"/><line x1="150" y1="292" x2="150" y2="242" stroke="#C8443B" stroke-width="1.5"/><text x="150" y="214" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#C8443B" font-weight="700" text-anchor="middle">24 Feb 2022</text><text x="150" y="234" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#4A5567" text-anchor="middle">Invasion of Ukraine begins</text><circle cx="330" cy="300" r="8" fill="#0F1828"/><line x1="330" y1="308" x2="330" y2="344" stroke="#0F1828" stroke-width="1.5"/><text x="330" y="364" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#0F1828" font-weight="700" text-anchor="middle">Late Feb–Mar</text><text x="330" y="384" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#4A5567" text-anchor="middle">SAP, Oracle, Microsoft, IBM</text><text x="330" y="401" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#4A5567" text-anchor="middle">suspend Russia operations</text><circle cx="540" cy="300" r="8" fill="#0F1828"/><line x1="540" y1="292" x2="540" y2="242" stroke="#0F1828" stroke-width="1.5"/><text x="540" y="214" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#0F1828" font-weight="700" text-anchor="middle">March 2022</text><text x="540" y="234" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#4A5567" text-anchor="middle">Oracle cuts support,</text><text x="540" y="251" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#4A5567" text-anchor="middle">updates and patches</text><circle cx="760" cy="300" r="8" fill="#0F1828"/><line x1="760" y1="308" x2="760" y2="344" stroke="#0F1828" stroke-width="1.5"/><text x="760" y="364" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#0F1828" font-weight="700" text-anchor="middle">2022</text><text x="760" y="384" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#4A5567" text-anchor="middle">Microsoft (≈90% of Russian</text><text x="760" y="401" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#4A5567" text-anchor="middle">clients) winds down</text><circle cx="1000" cy="300" r="8" fill="#C8443B"/><line x1="1000" y1="292" x2="1000" y2="242" stroke="#C8443B" stroke-width="1.5"/><text x="1000" y="214" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#C8443B" font-weight="700" text-anchor="middle">→ 2027</text><text x="1000" y="234" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#4A5567" text-anchor="middle">Russian banks ask state to</text><text x="1000" y="251" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#4A5567" text-anchor="middle">delay switch — no alternative exists</text></svg>