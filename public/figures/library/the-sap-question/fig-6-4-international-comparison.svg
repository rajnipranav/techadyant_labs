<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 560" width="1180" height="560"><rect width="1180" height="560" fill="#FBF9F4"/><rect x="40" y="34" width="80" height="5" fill="#C9A84C"/><text x="40" y="72" font-family="Arial, Helvetica, sans-serif" font-size="25" fill="#0F1828" font-weight="700" text-anchor="start">How four countries answer the same question</text><text x="40" y="95" font-family="Arial, Helvetica, sans-serif" font-size="13.5" fill="#4A5567" text-anchor="start">Domestic ERP capability, SAP dependence, and sovereign strategy — and the lesson each holds for India.</text><text x="1140" y="46" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#4A5567" letter-spacing="0.5" text-anchor="end">Figure 6.4 · Techadyant Labs · 2026</text><line x1="40" y1="518" x2="1140" y2="518" stroke="#E8E5DD" stroke-width="1.5"/><text x="40" y="538" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#4A5567" text-anchor="start">Source: Yonyou/Kingdee &amp; Synergy data; Douzone disclosures; ANSSI/Dassault; GAIA-X. Techadyant Labs analysis.</text><text x="48" y="148" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#0F1828" font-weight="700" text-anchor="start">Country</text><text x="168" y="148" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#0F1828" font-weight="700" text-anchor="start">Domestic ERP?</text><text x="318" y="148" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#0F1828" font-weight="700" text-anchor="start">Depends on SAP?</text><text x="468" y="148" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#0F1828" font-weight="700" text-anchor="start">Sovereign strategy</text><text x="678" y="148" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#0F1828" font-weight="700" text-anchor="start">The lesson for India</text><text x="48" y="192.0" font-family="Arial, Helvetica, sans-serif" font-size="13.5" fill="#0F1828" font-weight="700" text-anchor="start">Germany</text><text x="168" y="192.0" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#4A5567" text-anchor="start">Built SAP itself</text><text x="318" y="192.0" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#4A5567" text-anchor="start">No (owns it)</text><text x="468" y="192.0" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#4A5567" text-anchor="start">GAIA-X (stalled); pragmatic</text><text x="678" y="186.0" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F1828" font-weight="600" text-anchor="start">Sovereignty is layer-specific — captured in</text><text x="678" y="202.0" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F1828" font-weight="600" text-anchor="start">cloud it didn't build</text><line x1="40" y1="218" x2="1140" y2="218" stroke="#E8E5DD" stroke-width="1"/><text x="48" y="256.0" font-family="Arial, Helvetica, sans-serif" font-size="13.5" fill="#0F1828" font-weight="700" text-anchor="start">China</text><text x="168" y="256.0" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#4A5567" text-anchor="start">Yonyou, Kingdee</text><text x="318" y="256.0" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#4A5567" text-anchor="start">Yes, at high end</text><text x="468" y="256.0" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#4A5567" text-anchor="start">Xinchuang state mandate</text><text x="678" y="250.0" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F1828" font-weight="600" text-anchor="start">Forced substitution works but caps ~25% at</text><text x="678" y="266.0" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F1828" font-weight="600" text-anchor="start">the high end</text><line x1="40" y1="282" x2="1140" y2="282" stroke="#E8E5DD" stroke-width="1"/><text x="48" y="320.0" font-family="Arial, Helvetica, sans-serif" font-size="13.5" fill="#0F1828" font-weight="700" text-anchor="start">S. Korea</text><text x="168" y="320.0" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#4A5567" text-anchor="start">Douzone (strong)</text><text x="318" y="320.0" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#4A5567" text-anchor="start">Yes, large-ent.</text><text x="468" y="320.0" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#4A5567" text-anchor="start">Market-led; champion sold 2025</text><text x="678" y="314.0" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F1828" font-weight="600" text-anchor="start">Capability without scale + ownership stays</text><text x="678" y="330.0" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F1828" font-weight="600" text-anchor="start">mid-market</text><line x1="40" y1="346" x2="1140" y2="346" stroke="#E8E5DD" stroke-width="1"/><text x="48" y="384.0" font-family="Arial, Helvetica, sans-serif" font-size="13.5" fill="#0F1828" font-weight="700" text-anchor="start">France</text><text x="168" y="384.0" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#4A5567" text-anchor="start">Cegid/Sage (weak)</text><text x="318" y="384.0" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#4A5567" text-anchor="start">Partly</text><text x="468" y="384.0" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#4A5567" text-anchor="start">Owns Dassault + SecNumCloud cloud</text><text x="678" y="378.0" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F1828" font-weight="600" text-anchor="start">Specialise and own one layer globally</text><line x1="40" y1="410" x2="1140" y2="410" stroke="#E8E5DD" stroke-width="1"/><rect x="40" y="416" width="1100" height="58" rx="6" fill="#C9A84C" fill-opacity="0.10"/><text x="48" y="448.0" font-family="Arial, Helvetica, sans-serif" font-size="13.5" fill="#C8443B" font-weight="700" text-anchor="start">India</text><text x="168" y="448.0" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#4A5567" text-anchor="start">Zoho ERP (new)</text><text x="318" y="448.0" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#4A5567" text-anchor="start">Yes, deeply</text><text x="468" y="448.0" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#4A5567" text-anchor="start">Emerging (DPI proven)</text><text x="678" y="442.0" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F1828" font-weight="600" text-anchor="start">Extend proven DPI capability to the</text><text x="678" y="458.0" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#0F1828" font-weight="600" text-anchor="start">enterprise core</text><line x1="40" y1="474" x2="1140" y2="474" stroke="#E8E5DD" stroke-width="1"/></svg>