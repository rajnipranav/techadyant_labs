    <text class="st21" transform="translate(92 208)"><tspan x="0" y="0">EDI</tspan></text>
    <text class="st12" transform="translate(92 234)"><tspan x="0" y="0">Enterprise Dependency Index</tspan></text>
    <text class="st4" transform="translate(92 290)"><tspan x="0" y="0">UNIT: software LAYER</tspan></text>
    <text class="st19" transform="translate(92 324)"><tspan x="0" y="0">Scores each of 11 stack layers 0–100</tspan></text>
    <text class="st19" transform="translate(92 350)"><tspan x="0" y="0">on 7 weighted variables:</tspan></text>
    <text class="st5" transform="translate(104 384)"><tspan x="0" y="0">Strategic Criticality · 0.20</tspan></text>
    <text class="st5" transform="translate(104 410)"><tspan x="0" y="0">Switching Difficulty · 0.20</tspan></text>
