  <text class="st5" transform="translate(64 780)"><tspan x="0" y="0">Source: Techadyant Labs framework system (EDI · SSS · DIEM). Inputs from Gartner, IDC, Bain, RBI, NSO, SAP filings. Refreshed from the Strategic Intelligence Database after each report.</tspan></text>
  <text class="st6" transform="translate(64 808)"><tspan x="0" y="0">DIEM headline is a modelled estimate presented as a range, not a measured figure.</tspan></text>
