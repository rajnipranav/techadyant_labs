  <rect class="st28" y="0" width="1600" height="900"/>
  <text class="st26" transform="translate(64 70)"><tspan x="0" y="0">One set of inputs, three levels of sovereignty</tspan></text>
  <text class="st2" transform="translate(64 106)"><tspan x="0" y="0">The frameworks compose: layer scores roll up to sectors, sector scores roll up — GDP-weighted — to a single national exposure figure.</tspan></text>
  <text class="st1" transform="translate(1295.2896 54)"><tspan x="0" y="0">Figure 8.1 · Techadyant Labs · 2026</tspan></text>
