    <text class="st21" transform="translate(618 208)"><tspan x="0" y="0">SSS</tspan></text>
    <text class="st16" transform="translate(618 234)"><tspan x="0" y="0">Software Sovereignty Score</tspan></text>
    <text class="st4" transform="translate(618 290)"><tspan x="0" y="0">UNIT: economic SECTOR</tspan></text>
    <text class="st19" transform="translate(618 324)"><tspan x="0" y="0">Weights each sector&apos;s layer EDIs by</tspan></text>
    <text class="st19" transform="translate(618 350)"><tspan x="0" y="0">how much it relies on each layer.</tspan></text>
    <text class="st24" transform="translate(618 392)"><tspan x="0" y="0">SSS = 100 − Σ(reliance × EDI)</tspan></text>
    <text class="st5" transform="translate(618 420)"><tspan x="0" y="0">100 = fully sovereign</tspan></text>
