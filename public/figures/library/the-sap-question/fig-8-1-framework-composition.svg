    <text class="st5" transform="translate(104 462)"><tspan x="0" y="0">Domestic-Capability Deficit · 0.15</tspan></text>
    <text class="st5" transform="translate(104 488)"><tspan x="0" y="0">Geopolitical Exposure · 0.12</tspan></text>
    <text class="st5" transform="translate(104 514)"><tspan x="0" y="0">Security Exposure · 0.10</tspan></text>
    <text class="st5" transform="translate(104 540)"><tspan x="0" y="0">Vendor Concentration · 0.08</tspan></text>
