  <g id="Layer_1">
    <text class="st14" transform="translate(56 54)"><tspan x="0" y="0">The roadmap: who does what, by when</tspan></text>
    <text class="st5" transform="translate(56 84)"><tspan x="0" y="0">Four actors, three horizons. The decisive moves fall in the first column — the 2027 window — while it is still open.</tspan></text>
    <text class="st4" transform="translate(908.15 40)"><tspan x="0" y="0">Figure 28.1 · Techadyant Labs · 2026</tspan></text>
