      <text class="st2" transform="translate(252 233)"><tspan x="0" y="0">• Mandate SBOM + zero-trust (critical sectors)</tspan></text>
      <text class="st2" transform="translate(252 255)"><tspan x="0" y="0">• Fund sovereign LLM as infrastructure</tspan></text>
    </g>
    <g>
      <text class="st2" transform="translate(578 181)"><tspan x="0" y="0">• National ERP platform live for PSUs</tspan></text>
