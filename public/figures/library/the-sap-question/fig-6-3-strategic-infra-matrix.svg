<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 720" width="1180" height="720"><rect width="1180" height="720" fill="#FBF9F4"/><rect x="40" y="34" width="80" height="5" fill="#C9A84C"/><text x="40" y="72" font-family="Arial, Helvetica, sans-serif" font-size="25" fill="#0F1828" font-weight="700" text-anchor="start">The strategic-infrastructure matrix</text><text x="40" y="95" font-family="Arial, Helvetica, sans-serif" font-size="13.5" fill="#4A5567" text-anchor="start">Where SAP presence meets national importance. The top-right quadrant is the concentration of consequence.</text><text x="1140" y="46" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#4A5567" text-anchor="end">Figure 6.3 · Techadyant Labs · 2026</text><rect x="240" y="150" width="800" height="450" fill="#FFFFFF" stroke="#E8E5DD" stroke-width="1.5"/><rect x="640.0" y="150" width="400.0" height="225.0" fill="#C8443B" fill-opacity="0.06"/><line x1="640.0" y1="150" x2="640.0" y2="600" stroke="#E8E5DD" stroke-width="1"/><line x1="240" y1="375.0" x2="1040" y2="375.0" stroke="#E8E5DD" stroke-width="1"/><text x="640.0" y="640" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#0F1828" font-weight="700" text-anchor="middle">SAP presence  →</text><text x="195" y="375.0" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#0F1828" text-anchor="middle" transform="rotate(-90 195 375.0)">National importance  →</text><rect x="852" y="160" width="178" height="26" rx="6" fill="#C8443B" fill-opacity="0.12"/><text x="941" y="177" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#C8443B" font-weight="700" text-anchor="middle">HIGH-CONSEQUENCE ZONE</text><circle cx="1000" cy="213" r="9" fill="#C8443B" fill-opacity="0.9"/><text x="985.0" y="218.0" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#0F1828" font-weight="600" text-anchor="end">Oil &amp; Gas</text><circle cx="944" cy="182" r="9" fill="#C8443B" fill-opacity="0.9"/><text x="929.0" y="186.5" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#0F1828" font-weight="600" text-anchor="end">Power &amp; Utilities</text><circle cx="832" cy="157" r="9" fill="#C8443B" fill-opacity="0.9"/><text x="817.0" y="161.75" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#0F1828" font-weight="600" text-anchor="end">Defence production</text><circle cx="768" cy="195" r="9" fill="#C8443B" fill-opacity="0.9"/><text x="753.0" y="200.0" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#0F1828" font-weight="600" text-anchor="end">Railways</text><circle cx="1000" cy="267" r="9" fill="#C8443B" fill-opacity="0.9"/><text x="985.0" y="272.0" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#0F1828" font-weight="600" text-anchor="end">Metals &amp; heavy eng.</text><circle cx="896" cy="298" r="9" fill="#C9A84C" fill-opacity="0.9"/><text x="881.0" y="303.5" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#0F1828" font-weight="600" text-anchor="end">Aviation</text><circle cx="688" cy="240" r="9" fill="#C9A84C" fill-opacity="0.9"/><text x="703.0" y="245.0" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#0F1828" font-weight="600" text-anchor="start">Telecom</text><circle cx="608" cy="172" r="9" fill="#1A8A7D" fill-opacity="0.9"/><text x="623.0" y="177.5" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#0F1828" font-weight="600" text-anchor="start">Banking</text><circle cx="880" cy="344" r="9" fill="#C9A84C" fill-opacity="0.9"/><text x="865.0" y="348.5" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#0F1828" font-weight="600" text-anchor="end">Automotive (pvt)</text><circle cx="696" cy="344" r="9" fill="#C9A84C" fill-opacity="0.9"/><text x="681.0" y="348.5" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#0F1828" font-weight="600" text-anchor="end">Insurance</text><text x="240" y="670" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#1A8A7D" font-style="italic" text-anchor="start">Banking sits left of centre — India built its own core-banking products (the build-versus-buy exception).</text><line x1="40" y1="678" x2="1140" y2="678" stroke="#E8E5DD" stroke-width="1.5"/><text x="40" y="698" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#4A5567" text-anchor="start">Source: Techadyant Labs analysis of documented SAP deployments (Chapter 6).</text><text x="1140" y="698" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#C9A84C" font-style="italic" text-anchor="end">Indicative placement</text></svg>