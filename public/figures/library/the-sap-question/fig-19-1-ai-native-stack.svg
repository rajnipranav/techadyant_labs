<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 670" width="1180" height="670"><rect width="1180" height="670" fill="#FBF9F4"/><rect x="40" y="34" width="80" height="5" fill="#C9A84C"/><text x="40" y="72" font-family="Arial, Helvetica, sans-serif" font-size="25" fill="#0F1828" font-weight="700" text-anchor="start">How AI re-prices the enterprise stack</text><text x="40" y="95" font-family="Arial, Helvetica, sans-serif" font-size="13.5" fill="#4A5567" text-anchor="start">The same record-keeping core, reached two ways. AI both deepens lock-in and collapses the cost of building anew.</text><text x="1140" y="46" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#4A5567" letter-spacing="0.5" text-anchor="end">Figure 19.1 · Techadyant Labs · 2026</text><text x="290.0" y="155" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#0F1828" font-weight="700" text-anchor="middle">Today — forms-based stack</text><rect x="80" y="180" width="420" height="78" rx="8" fill="#FFFFFF" stroke="#4A5567" stroke-width="2"/><rect x="80" y="180" width="6" height="78" rx="3" fill="#4A5567"/><text x="102" y="212" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#0F1828" font-weight="700" text-anchor="start">Human operator</text><text x="102" y="236" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#4A5567" text-anchor="start">keys data into screens</text><line x1="290.0" y1="258" x2="290.0" y2="272" stroke="#4A5567" stroke-width="1.5"/><rect x="80" y="272" width="420" height="78" rx="8" fill="#FFFFFF" stroke="#4A5567" stroke-width="2"/><rect x="80" y="272" width="6" height="78" rx="3" fill="#4A5567"/><text x="102" y="304" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#0F1828" font-weight="700" text-anchor="start">Forms / UI layer</text><text x="102" y="328" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#4A5567" text-anchor="start">thousands of transaction screens</text><line x1="290.0" y1="350" x2="290.0" y2="364" stroke="#4A5567" stroke-width="1.5"/><rect x="80" y="364" width="420" height="78" rx="8" fill="#FFFFFF" stroke="#4A5567" stroke-width="2"/><rect x="80" y="364" width="6" height="78" rx="3" fill="#4A5567"/><text x="102" y="396" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#0F1828" font-weight="700" text-anchor="start">Application logic (SAP / Oracle)</text><text x="102" y="420" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#4A5567" text-anchor="start">the moat: 30 years of process code</text><line x1="290.0" y1="442" x2="290.0" y2="456" stroke="#4A5567" stroke-width="1.5"/><rect x="80" y="456" width="420" height="78" rx="8" fill="#FFFFFF" stroke="#4A5567" stroke-width="2"/><rect x="80" y="456" width="6" height="78" rx="3" fill="#4A5567"/><text x="102" y="488" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#0F1828" font-weight="700" text-anchor="start">Database / system of record</text><text x="102" y="512" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#4A5567" text-anchor="start">the data</text><text x="890.0" y="155" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#0F1828" font-weight="700" text-anchor="middle">AI-native stack</text><rect x="680" y="180" width="420" height="78" rx="8" fill="#FFFFFF" stroke="#1A8A7D" stroke-width="2"/><rect x="680" y="180" width="6" height="78" rx="3" fill="#1A8A7D"/><text x="702" y="212" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#0F1828" font-weight="700" text-anchor="start">Human intent</text><text x="702" y="236" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#4A5567" text-anchor="start">states the goal in language</text><line x1="890.0" y1="258" x2="890.0" y2="272" stroke="#4A5567" stroke-width="1.5"/><rect x="680" y="272" width="420" height="78" rx="8" fill="#FFFFFF" stroke="#1A8A7D" stroke-width="2"/><rect x="680" y="272" width="6" height="78" rx="3" fill="#1A8A7D"/><text x="702" y="304" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#0F1828" font-weight="700" text-anchor="start">Reasoning &amp; agent layer</text><text x="702" y="328" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#4A5567" text-anchor="start">operates the workflow — lock-in deepens here</text><line x1="890.0" y1="350" x2="890.0" y2="364" stroke="#4A5567" stroke-width="1.5"/><rect x="680" y="364" width="420" height="78" rx="8" fill="#FFFFFF" stroke="#1A8A7D" stroke-width="2"/><rect x="680" y="364" width="6" height="78" rx="3" fill="#1A8A7D"/><text x="702" y="396" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#0F1828" font-weight="700" text-anchor="start">Orchestration</text><text x="702" y="420" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#4A5567" text-anchor="start">plans, calls tools, checks results</text><line x1="890.0" y1="442" x2="890.0" y2="456" stroke="#4A5567" stroke-width="1.5"/><rect x="680" y="456" width="420" height="78" rx="8" fill="#FFFFFF" stroke="#1A8A7D" stroke-width="2"/><rect x="680" y="456" width="6" height="78" rx="3" fill="#1A8A7D"/><text x="702" y="488" font-family="Arial, Helvetica, sans-serif" font-size="14.5" fill="#0F1828" font-weight="700" text-anchor="start">Data substrate / system of record</text><text x="702" y="512" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#4A5567" text-anchor="start">the data — still the irreducible core</text><path d="M 505 360 L 675 360" stroke="#C9A84C" stroke-width="3"/><path d="M 669 353 L 678 360 L 669 367 Z" fill="#C9A84C"/><text x="590" y="344" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#C9A84C" font-weight="700" text-anchor="middle">AI re-prices</text><text x="590" y="388" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#C9A84C" font-weight="700" text-anchor="middle">the stack</text><text x="80" y="576" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#0F1828" text-anchor="start">Collapses: re-implementing the app layer — once the deepest switching cost — is increasingly automatable.</text><text x="80" y="598" font-family="Arial, Helvetica, sans-serif" font-size="12.5" fill="#0F1828" text-anchor="start">Deepens: agents trained on your own data make the incumbent stickier. Which force wins decides 2035.</text><line x1="40" y1="628" x2="1140" y2="628" stroke="#E8E5DD" stroke-width="1.5"/><text x="40" y="648" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#4A5567" text-anchor="start">Source: Techadyant Labs analysis.</text><text x="1140" y="648" font-family="Arial, Helvetica, sans-serif" font-size="11.5" fill="#C9A84C" font-style="italic" text-anchor="end">Schematic</text></svg>