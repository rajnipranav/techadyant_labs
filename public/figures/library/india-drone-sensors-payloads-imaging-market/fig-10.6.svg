<text x="80" y="938" font-size="15" fill="#4A5567" text-anchor="start">NDMA and state SDMAs hold limited drone fleets; most response runs on DaaS</text>
<text x="80" y="962" font-size="15" fill="#4A5567" text-anchor="start">emergency contracts. Demand is episodic - dual-use (disaster + commercial) sensors</text>
<text x="80" y="986" font-size="15" fill="#4A5567" text-anchor="start">de-risk it for dedicated manufacturers.</text>
<text x="60" y="1052" font-size="15" fill="#4A5567">Source: NDMA, SDMA deployment patterns. Techadyant Labs analysis.</text>
