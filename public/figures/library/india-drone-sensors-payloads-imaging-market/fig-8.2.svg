<line x1="638.7163983856198" y1="176" x2="638.7163983856198" y2="760" stroke="rgba(74,85,103,0.18)" stroke-width="1"/>
<text x="638.7163983856198" y="168" font-size="14" fill="#4A5567" text-anchor="middle" font-family="'JetBrains Mono','Courier New',monospace">1 m</text>
<line x1="820.0" y1="176" x2="820.0" y2="760" stroke="rgba(74,85,103,0.18)" stroke-width="1"/>
<text x="820.0" y="168" font-size="14" fill="#4A5567" text-anchor="middle" font-family="'JetBrains Mono','Courier New',monospace">5 m</text>
<rect x="120" y="190" width="700" height="86" rx="6" fill="rgba(74,85,103,0.05)"/>
<rect x="716.7909959640492" y="198" width="111.20900403595078" height="70" rx="5" fill="#C8443B" opacity="0.18"/>
<text x="130" y="220" font-size="19" fill="#0F1828" text-anchor="start" font-weight="700">Standard GPS</text>
<text x="130" y="244" font-size="14" fill="#4A5567" text-anchor="start">L1 code-phase</text>
<text x="814" y="220" font-size="18" fill="#0F1828" text-anchor="end" font-weight="700" font-family="'JetBrains Mono','Courier New',monospace">2-5 m</text>
