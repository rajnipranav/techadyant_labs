<text x="60" y="74" font-size="38" font-weight="700" fill="#0F1828">Carrier-Phase GNSS Closes the Centimetre Gap</text>
<text x="62" y="108" font-size="20" fill="#4A5567">Positioning accuracy, cost and India availability — GPS vs RTK vs PPK, 2026</text>
<text x="1540" y="50" font-size="16" fill="#4A5567" text-anchor="end" font-family="'JetBrains Mono','Courier New',monospace">Figure 8.2 &#183; Techadyant Labs &#183; 2026</text>
