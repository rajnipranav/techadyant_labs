<text x="1177.3333333333335" y="505.0" font-size="15.5" fill="#4A5567" text-anchor="start">Term sheet for 1-2 deals; explore</text>
<text x="1177.3333333333335" y="529.0" font-size="15.5" fill="#4A5567" text-anchor="start">co-investment with OEM partners.</text>
