<text x="784.6666666666667" y="635.0" font-size="15.5" fill="#4A5567" text-anchor="start">Announce PLI extension for sensor</text>
<text x="784.6666666666667" y="659.0" font-size="15.5" fill="#4A5567" text-anchor="start">components (LiDAR, IMU, multispectral).</text>
