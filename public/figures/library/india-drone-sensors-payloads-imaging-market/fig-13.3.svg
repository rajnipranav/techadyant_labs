<text x="1177.3333333333335" y="245.0" font-size="15.5" fill="#4A5567" text-anchor="start">File DGCA Type Certification for at</text>
<text x="1177.3333333333335" y="269.0" font-size="15.5" fill="#4A5567" text-anchor="start">least one new payload.</text>
