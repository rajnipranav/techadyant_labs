<text x="784.6666666666667" y="245.0" font-size="15.5" fill="#4A5567" text-anchor="start">Open talks with Eon Space (thermal) and</text>
<text x="784.6666666666667" y="269.0" font-size="15.5" fill="#4A5567" text-anchor="start">LiDAR integrators.</text>
