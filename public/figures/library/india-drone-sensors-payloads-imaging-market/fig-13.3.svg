<text x="60" y="74" font-size="38" font-weight="700" fill="#0F1828">The First 90 Days, by Stakeholder</text>
<text x="62" y="108" font-size="20" fill="#4A5567">30-60-90 day action plan across five stakeholder groups in India&#x27;s drone-sensor market</text>
