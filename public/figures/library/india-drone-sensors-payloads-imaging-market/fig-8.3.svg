<text x="940" y="492" font-size="18" fill="#C8443B" text-anchor="start" font-weight="700">Import dependence (by value): 75-80%</text>
<text x="940" y="522" font-size="15" fill="#0F1828" text-anchor="start">Domestic role = assembly of imported MEMS chips</text>
<text x="940" y="548" font-size="15" fill="#0F1828" text-anchor="start">into modules. No commercial MEMS fab in India</text>
<text x="940" y="574" font-size="15" fill="#0F1828" text-anchor="start">(IISc/IIT prototypes at TRL 3-4; fab needs</text>
<text x="940" y="600" font-size="15" fill="#0F1828" text-anchor="start">USD 500M+, unlikely before 2030-2032).</text>
<text x="60" y="771" font-size="15" fill="#4A5567">Source: Techadyant Labs analysis; Bosch, Analog Devices, Honeywell specifications.</text>
