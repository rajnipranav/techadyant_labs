<text x="1080" y="486" font-size="15" fill="#0F1828" text-anchor="start" font-family="'JetBrains Mono','Courier New',monospace">Indigenous preferred</text>
<text x="1360" y="486" font-size="15" fill="#4A5567" text-anchor="start" font-family="'JetBrains Mono','Courier New',monospace">Import permitted</text>
