<text x="1080" y="440" font-size="15" fill="#0F1828" text-anchor="start" font-family="'JetBrains Mono','Courier New',monospace">5 km+ thermal / 10 km+ EO/IR</text>
<text x="1360" y="440" font-size="15" fill="#4A5567" text-anchor="start" font-family="'JetBrains Mono','Courier New',monospace">1-2 km typical</text>
