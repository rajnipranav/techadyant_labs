<text x="1080" y="256" font-size="15" fill="#0F1828" text-anchor="start" font-family="'JetBrains Mono','Courier New',monospace">-40 to +70°C</text>
<text x="1360" y="256" font-size="15" fill="#4A5567" text-anchor="start" font-family="'JetBrains Mono','Courier New',monospace">-20 to +55°C</text>
<rect x="820" y="272" width="720" height="46" rx="0" fill="rgba(15,24,40,0.05)"/>
<text x="838" y="302" font-size="15" fill="#0F1828" text-anchor="start" font-weight="600">Ruggedisation</text>
<text x="1080" y="302" font-size="15" fill="#0F1828" text-anchor="start" font-family="'JetBrains Mono','Courier New',monospace">MIL-STD-810</text>
<text x="1360" y="302" font-size="15" fill="#4A5567" text-anchor="start" font-family="'JetBrains Mono','Courier New',monospace">Not required</text>
<rect x="820" y="318" width="720" height="46" rx="0" fill="#FBF9F4"/>
<text x="838" y="348" font-size="15" fill="#0F1828" text-anchor="start" font-weight="600">Data security</text>
<text x="1080" y="348" font-size="15" fill="#0F1828" text-anchor="start" font-family="'JetBrains Mono','Courier New',monospace">AES-256, tamper-proof</text>
<text x="1360" y="348" font-size="15" fill="#4A5567" text-anchor="start" font-family="'JetBrains Mono','Courier New',monospace">Basic encryption</text>
