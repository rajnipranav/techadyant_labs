<text x="838" y="672" font-size="15" fill="#4A5567" text-anchor="start">Highest per-unit value, longest cycles (2-5 yrs). IAF Mehar</text>
<text x="838" y="692" font-size="15" fill="#4A5567" text-anchor="start">Baba swarm tender explicitly seeks indigenous radar / EO/IR.</text>
