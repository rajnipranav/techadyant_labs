<text x="1080" y="394" font-size="15" fill="#0F1828" text-anchor="start" font-family="'JetBrains Mono','Courier New',monospace">&lt;100 ms end-to-end</text>
<text x="1360" y="394" font-size="15" fill="#4A5567" text-anchor="start" font-family="'JetBrains Mono','Courier New',monospace">Seconds acceptable</text>
