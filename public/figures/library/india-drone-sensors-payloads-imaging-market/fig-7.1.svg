<text x="815.0" y="276" font-size="15" fill="#0F1828" text-anchor="middle">RTK GPS, IMU boards,</text>
<text x="815.0" y="300" font-size="15" fill="#0F1828" text-anchor="middle">thermal &amp; multispectral modules</text>
<text x="815.0" y="358" font-size="14" fill="#0F1828" text-anchor="middle" font-weight="700" font-family="'JetBrains Mono','Courier New',monospace">India value: 10-15%</text>
