<text x="505.0" y="276" font-size="15" fill="#0F1828" text-anchor="middle">MEMS chips, LiDAR</text>
<text x="505.0" y="300" font-size="15" fill="#0F1828" text-anchor="middle">scan engines, thermal arrays</text>
<text x="505.0" y="358" font-size="14" fill="#0F1828" text-anchor="middle" font-weight="700" font-family="'JetBrains Mono','Courier New',monospace">India value: &lt;5%</text>
