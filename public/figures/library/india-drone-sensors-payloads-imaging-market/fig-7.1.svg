<text x="60" y="74" font-size="38" font-weight="700" fill="#0F1828">India&#x27;s Drone-Sensor Supply Chain</text>
<text x="62" y="108" font-size="20" fill="#4A5567">From raw materials to OEM: where value sits and where imports dominate, 2026</text>
<text x="1540" y="50" font-size="16" fill="#4A5567" text-anchor="end" font-family="'JetBrains Mono','Courier New',monospace">Figure 7.1 &#183; Techadyant Labs &#183; 2026</text>
<defs><marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#4A5567"/></marker></defs>
<text x="60" y="150" font-size="22" fill="#4A5567" text-anchor="start">Value capture rises along the chain; component dependence on imports is near-total</text>
<rect x="60" y="200" width="270" height="180" rx="12" fill="rgba(200,68,59,0.85)" stroke="#C8443B" stroke-width="1.6"/>
<text x="195.0" y="240" font-size="18" fill="#0F1828" text-anchor="middle" font-weight="700">RAW MATERIALS</text>
<text x="195.0" y="276" font-size="15" fill="#0F1828" text-anchor="middle">Silicon, germanium,</text>
<text x="195.0" y="300" font-size="15" fill="#0F1828" text-anchor="middle">chalcogenide glass (IR)</text>
<text x="195.0" y="358" font-size="14" fill="#0F1828" text-anchor="middle" font-weight="700" font-family="'JetBrains Mono','Courier New',monospace">India value: &lt;5%</text>
