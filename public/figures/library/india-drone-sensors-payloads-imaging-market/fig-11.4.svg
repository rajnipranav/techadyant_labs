<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="Arial, Helvetica, sans-serif">
<rect x="0" y="0" width="1600" height="900" fill="#FBF9F4"/>
<rect x="0" y="0" width="1600" height="10" fill="#0F1828"/>
<rect x="0" y="10" width="1600" height="3" fill="#C9A84C"/>
<text x="60" y="74" font-size="38" font-weight="700" fill="#0F1828">Five Business-Model Shifts to 2030</text>
<text x="62" y="108" font-size="20" fill="#4A5567">Expected drone-sensor monetisation trends in India, 2026-2030 · timing and lead sectors</text>
<text x="1540" y="50" font-size="16" fill="#4A5567" text-anchor="end" font-family="'JetBrains Mono','Courier New',monospace">Figure 11.4 &#183; Techadyant Labs &#183; 2026</text>
<rect x="70.0" y="152" width="710.0" height="216" rx="14" fill="#FFFFFF" stroke="rgba(15,24,40,0.15)" stroke-width="1.5"/>
<rect x="70.0" y="152" width="8" height="216" rx="4" fill="#C9A84C"/>
<text x="98.0" y="190" font-size="15" fill="#C9A84C" text-anchor="start" font-weight="700" font-family="'JetBrains Mono','Courier New',monospace">TREND 1</text>
<text x="98.0" y="218" font-size="22" fill="#0F1828" text-anchor="start" font-weight="700">Outcome-Based Pricing</text>
<text x="98.0" y="252" font-size="16" fill="#4A5567" text-anchor="start">Shift from per-hour/per-acre to per-tonne-measured,</text>
<text x="98.0" y="276" font-size="16" fill="#4A5567" text-anchor="start">per-km-inspected, per-input-saved. Mining example: price</text>
<text x="98.0" y="300" font-size="16" fill="#4A5567" text-anchor="start">linked to ore reconciled (USD 0.10-0.50/tonne).</text>
<line x1="98.0" y1="312" x2="756.0" y2="312" stroke="rgba(15,24,40,0.12)" stroke-width="1"/>
<rect x="98.0" y="322" width="176" height="30" rx="15" fill="rgba(201,168,76,0.16)"/>
<text x="186.0" y="342" font-size="14" fill="#0F1828" text-anchor="middle" font-weight="700" font-family="'JetBrains Mono','Courier New',monospace">2027-2029</text>
<text x="756.0" y="342" font-size="15" fill="#4A5567" text-anchor="end" font-style="italic">Mining, agriculture first</text>
<rect x="70.0" y="392" width="710.0" height="216" rx="14" fill="#FFFFFF" stroke="rgba(15,24,40,0.15)" stroke-width="1.5"/>
<rect x="70.0" y="392" width="8" height="216" rx="4" fill="#2BC5B4"/>
<text x="98.0" y="430" font-size="15" fill="#2BC5B4" text-anchor="start" font-weight="700" font-family="'JetBrains Mono','Courier New',monospace">TREND 2</text>
<text x="98.0" y="458" font-size="22" fill="#0F1828" text-anchor="start" font-weight="700">Sensor Marketplaces &amp; Swappable Standards</text>
<text x="98.0" y="492" font-size="16" fill="#4A5567" text-anchor="start">Standardised payload interface (open, DJI-SDK-like) lets</text>
<text x="98.0" y="516" font-size="16" fill="#4A5567" text-anchor="start">third-party sensor modules plug into multiple platforms.</text>
<text x="98.0" y="540" font-size="16" fill="#4A5567" text-anchor="start">Marketplace for sensor modules emerges.</text>
<line x1="98.0" y1="552" x2="756.0" y2="552" stroke="rgba(15,24,40,0.12)" stroke-width="1"/>
<rect x="98.0" y="562" width="176" height="30" rx="15" fill="rgba(43,197,180,0.16)"/>
<text x="186.0" y="582" font-size="14" fill="#0F1828" text-anchor="middle" font-weight="700" font-family="'JetBrains Mono','Courier New',monospace">2028-2030</text>
<text x="756.0" y="582" font-size="15" fill="#4A5567" text-anchor="end" font-style="italic">If DGCA standardises</text>
<rect x="70.0" y="632" width="710.0" height="216" rx="14" fill="#FFFFFF" stroke="rgba(15,24,40,0.15)" stroke-width="1.5"/>
<rect x="70.0" y="632" width="8" height="216" rx="4" fill="#C9A84C"/>
<text x="98.0" y="670" font-size="15" fill="#C9A84C" text-anchor="start" font-weight="700" font-family="'JetBrains Mono','Courier New',monospace">TREND 3</text>
<text x="98.0" y="698" font-size="22" fill="#0F1828" text-anchor="start" font-weight="700">Sensor-as-a-Service Bundled with DaaS</text>
<text x="98.0" y="732" font-size="16" fill="#4A5567" text-anchor="start">DaaS providers offer sensor upgrade as a tiered</text>
<text x="98.0" y="756" font-size="16" fill="#4A5567" text-anchor="start">subscription (RGB to multispectral to LiDAR) with</text>
<text x="98.0" y="780" font-size="16" fill="#4A5567" text-anchor="start">over-the-air calibration and processing.</text>
<line x1="98.0" y1="792" x2="756.0" y2="792" stroke="rgba(15,24,40,0.12)" stroke-width="1"/>
<rect x="98.0" y="802" width="176" height="30" rx="15" fill="rgba(201,168,76,0.16)"/>
<text x="186.0" y="822" font-size="14" fill="#0F1828" text-anchor="middle" font-weight="700" font-family="'JetBrains Mono','Courier New',monospace">2027-2028</text>
<text x="756.0" y="822" font-size="15" fill="#4A5567" text-anchor="end" font-style="italic">Garuda, IdeaForge-led</text>
<rect x="820.0" y="152" width="710.0" height="216" rx="14" fill="#FFFFFF" stroke="rgba(15,24,40,0.15)" stroke-width="1.5"/>
<rect x="820.0" y="152" width="8" height="216" rx="4" fill="#2BC5B4"/>
<text x="848.0" y="190" font-size="15" fill="#2BC5B4" text-anchor="start" font-weight="700" font-family="'JetBrains Mono','Courier New',monospace">TREND 4</text>
<text x="848.0" y="218" font-size="22" fill="#0F1828" text-anchor="start" font-weight="700">Data Cooperatives &amp; Shared Sensor Pools</text>
<text x="848.0" y="252" font-size="16" fill="#4A5567" text-anchor="start">Farmer cooperatives (FPOs) pool sensor data across large</text>
<text x="848.0" y="276" font-size="16" fill="#4A5567" text-anchor="start">areas; anonymised data sold to agri-input firms, insurers,</text>
<text x="848.0" y="300" font-size="16" fill="#4A5567" text-anchor="start">government. Makers take revenue share.</text>
<line x1="848.0" y1="312" x2="1506.0" y2="312" stroke="rgba(15,24,40,0.12)" stroke-width="1"/>
<rect x="848.0" y="322" width="176" height="30" rx="15" fill="rgba(43,197,180,0.16)"/>
<text x="936.0" y="342" font-size="14" fill="#0F1828" text-anchor="middle" font-weight="700" font-family="'JetBrains Mono','Courier New',monospace">2028-2030</text>
<text x="1506.0" y="342" font-size="15" fill="#4A5567" text-anchor="end" font-style="italic">Drone Shakti 2.0</text>
<rect x="820.0" y="392" width="710.0" height="216" rx="14" fill="#FFFFFF" stroke="rgba(15,24,40,0.15)" stroke-width="1.5"/>
<rect x="820.0" y="392" width="8" height="216" rx="4" fill="#C9A84C"/>
<text x="848.0" y="430" font-size="15" fill="#C9A84C" text-anchor="start" font-weight="700" font-family="'JetBrains Mono','Courier New',monospace">TREND 5</text>
<text x="848.0" y="458" font-size="22" fill="#0F1828" text-anchor="start" font-weight="700">Export of Sensor-Integrated Payloads</text>
<text x="848.0" y="492" font-size="16" fill="#4A5567" text-anchor="start">Indian payloads (Eon Space thermal, IdeaForge systems)</text>
<text x="848.0" y="516" font-size="16" fill="#4A5567" text-anchor="start">become cost-competitive for export to Southeast Asia,</text>
<text x="848.0" y="540" font-size="16" fill="#4A5567" text-anchor="start">Africa, the Middle East.</text>
<line x1="848.0" y1="552" x2="1506.0" y2="552" stroke="rgba(15,24,40,0.12)" stroke-width="1"/>
<rect x="848.0" y="562" width="176" height="30" rx="15" fill="rgba(201,168,76,0.16)"/>
<text x="936.0" y="582" font-size="14" fill="#0F1828" text-anchor="middle" font-weight="700" font-family="'JetBrains Mono','Courier New',monospace">2028-2030</text>
<text x="1506.0" y="582" font-size="15" fill="#4A5567" text-anchor="end" font-style="italic">BEL / IdeaForge / Eon</text>
<text x="60" y="872" font-size="15" fill="#4A5567">Source: Techadyant Labs analysis.</text>
<text x="1540" y="872" font-size="15" font-style="italic" fill="#C9A84C" text-anchor="end">Forecast</text>
</svg>