<text x="1170" y="268" font-size="15" fill="#4A5567" text-anchor="start">Funding peaked in 2024-2025 (Eon Space</text>
<text x="1170" y="294" font-size="15" fill="#4A5567" text-anchor="start">Labs Series A and others).</text>
<text x="1170" y="346" font-size="15" fill="#4A5567" text-anchor="start">2026 slowdown reflects a broad VC</text>
<text x="1170" y="372" font-size="15" fill="#4A5567" text-anchor="start">pullback - not drone-specific.</text>
<text x="1170" y="424" font-size="15" fill="#4A5567" text-anchor="start">Most rounds are early-stage (Seed /</text>
<text x="1170" y="450" font-size="15" fill="#4A5567" text-anchor="start">Series A); growth capital is scarce.</text>
