<text x="60" y="74" font-size="38" font-weight="700" fill="#0F1828">Case Study: Eon Space Labs Germanium-Free Thermal</text>
<text x="62" y="108" font-size="20" fill="#4A5567">Indigenous EO/IR thermal imaging, Bengaluru, 2024-2027</text>
<text x="1540" y="50" font-size="16" fill="#4A5567" text-anchor="end" font-family="'JetBrains Mono','Courier New',monospace">Figure 7.3 &#183; Techadyant Labs &#183; 2026</text>
<text x="60" y="150" font-size="21" fill="#4A5567" text-anchor="start">A germanium-free thermal imager that matches imports on performance and undercuts them on cost</text>
