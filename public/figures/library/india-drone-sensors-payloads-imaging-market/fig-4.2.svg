<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1180" font-family="Arial, Helvetica, sans-serif">
<rect x="0" y="0" width="1600" height="1180" fill="#FBF9F4"/>
<rect x="0" y="0" width="1600" height="10" fill="#0F1828"/>
<rect x="0" y="10" width="1600" height="3" fill="#C9A84C"/>
<text x="60" y="74" font-size="38" font-weight="700" fill="#0F1828">BVLOS and Indigenisation Lead the Demand</text>
<text x="62" y="108" font-size="20" fill="#4A5567">Six market drivers ranked by contribution weighting - Base scenario, 2026-2035</text>
<text x="1540" y="50" font-size="16" fill="#4A5567" text-anchor="end" font-family="'JetBrains Mono','Courier New',monospace">Figure 4.2 &#183; Techadyant Labs &#183; 2026</text>
<text x="60" y="150" font-size="18" fill="#4A5567" text-anchor="start" font-style="italic">Combined driver weighting sums to 100% of forecast uplift</text>
<text x="60" y="184" font-size="15" fill="#C9A84C" text-anchor="start" font-weight="700" font-family="'JetBrains Mono','Courier New',monospace">Driver 1</text>
<text x="60" y="214" font-size="21" fill="#0F1828" text-anchor="start" font-weight="700">BVLOS Liberalisation</text>
<rect x="420" y="188" width="560" height="30" rx="6" fill="rgba(15,24,40,0.06)"/>
<rect x="420" y="188" width="513.3333333333333" height="30" rx="6" fill="#C9A84C"/>
<text x="947.3333333333333" y="210" font-size="19" fill="#0F1828" text-anchor="start" font-weight="700" font-family="'JetBrains Mono','Courier New',monospace">Weight 25-30%</text>
<text x="60" y="248" font-size="14" fill="#4A5567" text-anchor="start" font-weight="700">Mechanism</text>
<text x="60" y="272" font-size="16" fill="#4A5567" text-anchor="start">Beyond-visual-line-of-sight operations require redundant</text>
<text x="60" y="294" font-size="16" fill="#4A5567" text-anchor="start">sensing and collision avoidance - lifting sensor count</text>
<text x="60" y="316" font-size="16" fill="#4A5567" text-anchor="start">per drone and premium-sensor adoption.</text>
<line x1="60" y1="312" x2="1540" y2="312" stroke="rgba(15,24,40,0.12)" stroke-width="1"/>
<text x="60" y="342" font-size="15" fill="#C9A84C" text-anchor="start" font-weight="700" font-family="'JetBrains Mono','Courier New',monospace">Driver 2</text>
<text x="60" y="372" font-size="21" fill="#0F1828" text-anchor="start" font-weight="700">Indigenous Sensor Development</text>
<rect x="420" y="346" width="560" height="30" rx="6" fill="rgba(15,24,40,0.06)"/>
<rect x="420" y="346" width="420.0" height="30" rx="6" fill="#C9A84C"/>
<text x="854.0" y="368" font-size="19" fill="#0F1828" text-anchor="start" font-weight="700" font-family="'JetBrains Mono','Courier New',monospace">Weight 20-25%</text>
<text x="60" y="406" font-size="14" fill="#4A5567" text-anchor="start" font-weight="700">Mechanism</text>
<text x="60" y="430" font-size="16" fill="#4A5567" text-anchor="start">Domestic alternatives cut cost and lead time, broaden</text>
<text x="60" y="452" font-size="16" fill="#4A5567" text-anchor="start">adoption across price segments and recapture value</text>
<text x="60" y="474" font-size="16" fill="#4A5567" text-anchor="start">previously lost to imports.</text>
<line x1="60" y1="470" x2="1540" y2="470" stroke="rgba(15,24,40,0.12)" stroke-width="1"/>
<text x="60" y="500" font-size="15" fill="#C9A84C" text-anchor="start" font-weight="700" font-family="'JetBrains Mono','Courier New',monospace">Driver 3</text>
<text x="60" y="530" font-size="21" fill="#0F1828" text-anchor="start" font-weight="700">Defence Modernisation</text>
<rect x="420" y="504" width="560" height="30" rx="6" fill="rgba(15,24,40,0.06)"/>
<rect x="420" y="504" width="326.6666666666667" height="30" rx="6" fill="#C9A84C"/>
<text x="760.6666666666667" y="526" font-size="19" fill="#0F1828" text-anchor="start" font-weight="700" font-family="'JetBrains Mono','Courier New',monospace">Weight 15-20%</text>
<text x="60" y="564" font-size="14" fill="#4A5567" text-anchor="start" font-weight="700">Mechanism</text>
<text x="60" y="588" font-size="16" fill="#4A5567" text-anchor="start">Border surveillance, ISR and swarm programmes pull</text>
<text x="60" y="610" font-size="16" fill="#4A5567" text-anchor="start">higher-ASP EO/IR, radar and LiDAR sensors on</text>
<text x="60" y="632" font-size="16" fill="#4A5567" text-anchor="start">recurring procurement cycles.</text>
<line x1="60" y1="628" x2="1540" y2="628" stroke="rgba(15,24,40,0.12)" stroke-width="1"/>
<text x="60" y="658" font-size="15" fill="#C9A84C" text-anchor="start" font-weight="700" font-family="'JetBrains Mono','Courier New',monospace">Driver 4</text>
<text x="60" y="688" font-size="21" fill="#0F1828" text-anchor="start" font-weight="700">PLI &amp; Manufacturing Incentives</text>
<rect x="420" y="662" width="560" height="30" rx="6" fill="rgba(15,24,40,0.06)"/>
<rect x="420" y="662" width="252.0" height="30" rx="6" fill="#C9A84C"/>
<text x="686.0" y="684" font-size="19" fill="#0F1828" text-anchor="start" font-weight="700" font-family="'JetBrains Mono','Courier New',monospace">Weight 12-15%</text>
<text x="60" y="722" font-size="14" fill="#4A5567" text-anchor="start" font-weight="700">Mechanism</text>
<text x="60" y="746" font-size="16" fill="#4A5567" text-anchor="start">Lowers import dependence and the cost of indigenous</text>
<text x="60" y="768" font-size="16" fill="#4A5567" text-anchor="start">sensors, improving affordability and stimulating</text>
<text x="60" y="790" font-size="16" fill="#4A5567" text-anchor="start">domestic demand.</text>
<line x1="60" y1="786" x2="1540" y2="786" stroke="rgba(15,24,40,0.12)" stroke-width="1"/>
<text x="60" y="816" font-size="15" fill="#C9A84C" text-anchor="start" font-weight="700" font-family="'JetBrains Mono','Courier New',monospace">Driver 5</text>
<text x="60" y="846" font-size="21" fill="#0F1828" text-anchor="start" font-weight="700">Commercial Adoption (non-agri)</text>
<rect x="420" y="820" width="560" height="30" rx="6" fill="rgba(15,24,40,0.06)"/>
<rect x="420" y="820" width="205.33333333333331" height="30" rx="6" fill="#C9A84C"/>
<text x="639.3333333333333" y="842" font-size="19" fill="#0F1828" text-anchor="start" font-weight="700" font-family="'JetBrains Mono','Courier New',monospace">Weight 10-12%</text>
<text x="60" y="880" font-size="14" fill="#4A5567" text-anchor="start" font-weight="700">Mechanism</text>
<text x="60" y="904" font-size="16" fill="#4A5567" text-anchor="start">Mining, infrastructure, logistics and smart-city users</text>
<text x="60" y="926" font-size="16" fill="#4A5567" text-anchor="start">shift from manual inspection to drone sensing -</text>
<text x="60" y="948" font-size="16" fill="#4A5567" text-anchor="start">volume demand for integrated payloads.</text>
<line x1="60" y1="944" x2="1540" y2="944" stroke="rgba(15,24,40,0.12)" stroke-width="1"/>
<text x="60" y="974" font-size="15" fill="#C9A84C" text-anchor="start" font-weight="700" font-family="'JetBrains Mono','Courier New',monospace">Driver 6</text>
<text x="60" y="1004" font-size="21" fill="#0F1828" text-anchor="start" font-weight="700">Drone Shakti (agriculture)</text>
<rect x="420" y="978" width="560" height="30" rx="6" fill="rgba(15,24,40,0.06)"/>
<rect x="420" y="978" width="168.0" height="30" rx="6" fill="#C9A84C"/>
<text x="602.0" y="1000" font-size="19" fill="#0F1828" text-anchor="start" font-weight="700" font-family="'JetBrains Mono','Courier New',monospace">Weight 8-10%</text>
<text x="60" y="1038" font-size="14" fill="#4A5567" text-anchor="start" font-weight="700">Mechanism</text>
<text x="60" y="1062" font-size="16" fill="#4A5567" text-anchor="start">Subsidised agri adoption creates high-volume, lower-ASP</text>
<text x="60" y="1084" font-size="16" fill="#4A5567" text-anchor="start">demand for multispectral and spraying sensors and an</text>
<text x="60" y="1106" font-size="16" fill="#4A5567" text-anchor="start">operator base for future upgrades.</text>
<text x="60" y="1152" font-size="15" fill="#4A5567">Source: Techadyant Labs scenario model; DGCA, PLI and Drone Shakti policy inputs. Techadyant Labs analysis.</text>
<text x="1540" y="1152" font-size="15" font-style="italic" fill="#C9A84C" text-anchor="end">Indicative</text>
</svg>