<rect x="200" y="450" width="480" height="70" rx="8" fill="#FBF9F4" stroke="#4A5567"/><text x="440" y="492" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#0F1828" text-anchor="middle">One-time consent at install</text>
