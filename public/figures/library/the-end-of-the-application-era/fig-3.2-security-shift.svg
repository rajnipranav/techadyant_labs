<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg"><rect width="1600" height="900" fill="#FBF9F4"/><rect width="1600" height="8" fill="#C9A84C"/><text x="60" y="62" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700" fill="#0F1828">The Security Inversion: From User Identity to Agent Trust</text><text x="60" y="90" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#4A5567">Governance moves from a one-time human grant to continuous agent-workload identity.</text><text x="1540" y="40" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#4A5567" text-anchor="end">Figure 3.2 &#183; Techadyant Labs &#183; 2026</text><rect x="160" y="180" width="560" height="520" rx="12" fill="#E8E5DD" stroke="#4A5567" stroke-width="2"/><text x="440" y="225" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#0F1828" text-anchor="middle">Application era</text>
