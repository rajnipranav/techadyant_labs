<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg"><rect width="1600" height="900" fill="#FBF9F4"/><rect width="1600" height="8" fill="#C9A84C"/><text x="60" y="62" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700" fill="#0F1828">Major Operating-System Redesigns Are Rare</text><text x="60" y="90" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#4A5567">From mainframe batch to the cloud - and why agentic AI forces the next shift.</text><text x="1540" y="40" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#4A5567" text-anchor="end">Figure 1.1 &#183; Techadyant Labs &#183; 2026</text><line x1="160" y1="470" x2="1480" y2="470" stroke="#0F1828" stroke-width="3"/>
<circle cx="200.0" cy="470" r="11" fill="#4A5567"/>
<line x1="200.0" y1="470" x2="200.0" y2="380" stroke="#4A5567" stroke-width="2" stroke-dasharray="3 3"/>
