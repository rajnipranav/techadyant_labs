<text x="448.0" y="628" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#4A5567" text-anchor="middle">Time-sharing &amp; Unix</text>
<circle cx="696.0" cy="470" r="11" fill="#4A5567"/>
<line x1="696.0" y1="470" x2="696.0" y2="380" stroke="#4A5567" stroke-width="2" stroke-dasharray="3 3"/>
<text x="696.0" y="350" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#0F1828" text-anchor="middle">1980s</text>
<text x="696.0" y="378" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#4A5567" text-anchor="middle">PC + GUI apps</text>
<circle cx="944.0" cy="470" r="11" fill="#2BC5B4"/>
<line x1="944.0" y1="470" x2="944.0" y2="560" stroke="#2BC5B4" stroke-width="2" stroke-dasharray="3 3"/>
<text x="944.0" y="600" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#0F1828" text-anchor="middle">2006</text>
<text x="944.0" y="628" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#4A5567" text-anchor="middle">Cloud / virtualisation</text>
<circle cx="1192.0" cy="470" r="11" fill="#2BC5B4"/>
<line x1="1192.0" y1="470" x2="1192.0" y2="380" stroke="#2BC5B4" stroke-width="2" stroke-dasharray="3 3"/>
<text x="1192.0" y="350" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#0F1828" text-anchor="middle">2013</text>
<text x="1192.0" y="378" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#4A5567" text-anchor="middle">Containers</text>
<circle cx="1440.0" cy="470" r="11" fill="#C9A84C"/>
<line x1="1440.0" y1="470" x2="1440.0" y2="560" stroke="#C9A84C" stroke-width="2" stroke-dasharray="3 3"/>
<text x="1440.0" y="600" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#0F1828" text-anchor="middle">2026</text>
<text x="1440.0" y="628" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#4A5567" text-anchor="middle">Agentic AI</text>
<text x="800" y="700" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#4A5567" text-anchor="middle">Major OS redesigns are rare; the cloud was the last. Agentic AI forces the next.</text><line x1="60" y1="854" x2="1540" y2="854" stroke="#E8E5DD"/><text x="60" y="876" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#4A5567">Source: Bell Labs (Unix); The Open Group (POSIX); AWS (EC2, 2006); OCI. Techadyant Labs analysis.</text></svg>