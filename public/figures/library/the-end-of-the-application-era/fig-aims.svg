<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
<rect width="1600" height="900" fill="#FBF9F4"/>
<rect x="0" y="0" width="1600" height="8" fill="#C9A84C"/>
<text x="60" y="62" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#0F1828">AIMS - The Four Control Primitives</text>
<text x="60" y="92" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#4A5567">Where value concentrates as the application dissolves.</text>
<text x="1540" y="40" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#4A5567" text-anchor="end">Figure 2 &#183; Techadyant Labs &#183; 2026</text>
<text x="800" y="128" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#4A5567" text-anchor="middle">AIMS = the four primitives that replace the application as the unit of value</text>
<rect x="60" y="170" width="700" height="300" rx="10" fill="#E8E5DD" stroke="#4A5567" stroke-width="1.5"/>
<rect x="60" y="170" width="14" height="300" fill="#2BC5B4"/>
<circle cx="130" cy="242" r="38" fill="#0F1828"/><text x="130" y="254" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700" fill="#FBF9F4" text-anchor="middle">A</text>
<text x="190" y="232" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#0F1828">Accelerated inference</text>
<text x="190" y="262" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" fill="#C9A84C">PAS L1-L2</text>
<text x="94" y="320" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#0F1828">Control the silicon + serving substrate agents run on.</text>
<text x="94" y="380" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#4A5567">MOAT TEST</text>
<text x="94" y="408" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#4A5567">Owns the dominant accelerator + serving stack.</text>
<rect x="800" y="170" width="700" height="300" rx="10" fill="#E8E5DD" stroke="#4A5567" stroke-width="1.5"/>
<rect x="800" y="170" width="14" height="300" fill="#2BC5B4"/>
<circle cx="870" cy="242" r="38" fill="#0F1828"/><text x="870" y="254" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700" fill="#FBF9F4" text-anchor="middle">I</text>
<text x="930" y="232" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#0F1828">Identity &amp; delegation</text>
<text x="930" y="262" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" fill="#C9A84C">PAS L5</text>
<text x="834" y="320" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#0F1828">Control how agent trust is issued, scoped and revoked.</text>
<text x="834" y="380" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#4A5567">MOAT TEST</text>
<text x="834" y="408" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#4A5567">Sets the agent-identity standard others adopt.</text>
<rect x="60" y="510" width="700" height="300" rx="10" fill="#E8E5DD" stroke="#4A5567" stroke-width="1.5"/>
<rect x="60" y="510" width="14" height="300" fill="#2BC5B4"/>
<circle cx="130" cy="582" r="38" fill="#0F1828"/><text x="130" y="594" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700" fill="#FBF9F4" text-anchor="middle">M</text>
<text x="190" y="572" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#0F1828">Memory &amp; context</text>
<text x="190" y="602" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" fill="#C9A84C">PAS L3</text>
<text x="94" y="660" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#0F1828">Control the persistent context layer agents reason over.</text>
<text x="94" y="720" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#4A5567">MOAT TEST</text>
<text x="94" y="748" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#4A5567">Owns the context/memory fabric, not a per-app buffer.</text>
<rect x="800" y="510" width="700" height="300" rx="10" fill="#E8E5DD" stroke="#4A5567" stroke-width="1.5"/>
<rect x="800" y="510" width="14" height="300" fill="#2BC5B4"/>
<circle cx="870" cy="582" r="38" fill="#0F1828"/><text x="870" y="594" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700" fill="#FBF9F4" text-anchor="middle">S</text>
<text x="930" y="572" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#0F1828">Scheduling &amp; orchestration</text>
<text x="930" y="602" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" fill="#C9A84C">PAS L4 / L6</text>
<text x="834" y="660" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#0F1828">Control how agent work is composed, prioritised and run.</text>
<text x="834" y="720" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="#4A5567">MOAT TEST</text>
<text x="834" y="748" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#4A5567">Owns the runtime / scheduler agents execute on.</text>
<line x1="60" y1="854" x2="1540" y2="854" stroke="#E8E5DD" stroke-width="1"/>
<text x="60" y="876" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#4A5567">Source: Techadyant Labs framework (AIMS). Techadyant Labs analysis.</text>
</svg>