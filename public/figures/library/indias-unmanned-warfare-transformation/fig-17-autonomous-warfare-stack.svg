<text x="40" y="44" font-size="22" font-weight="700" fill="#0F1828">The Autonomous Warfare Stack</text>
<text x="40" y="68" font-size="13" fill="#4A5567">Where value, vulnerability and sovereignty sit in an unmanned system</text>
<text x="780" y="30" font-size="11" fill="#4A5567" text-anchor="end">Techadyant Labs &#183; 2026</text>
<text x="200" y="98" font-size="11" fill="#4A5567">Value rises up the stack &#8594; the airframe is cheapest, the decision layer decisive</text>
<defs><marker id="up" markerWidth="9" markerHeight="9" refX="4" refY="4" orient="auto"><path d="M0,8 L4,0 L8,8 Z" fill="#C9A84C"/></marker></defs>
<rect x="200" y="110" width="380" height="56" rx="3" fill="#C8443B"/>
