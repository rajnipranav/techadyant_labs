<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 460" font-family="Arial, Helvetica, sans-serif">
<rect width="780" height="460" fill="#FBF9F4"/>
<rect x="0" y="0" width="780" height="6" fill="#0F1828"/>
<text x="40" y="44" font-size="22" font-weight="700" fill="#0F1828">Five capability pillars, ~30 categories, ~80 variants</text>
<text x="40" y="68" font-size="13" fill="#4A5567">How the roadmap organises future unmanned capability</text>
<text x="740" y="30" font-size="11" fill="#4A5567" text-anchor="end">Techadyant Labs &#183; 2026</text>
<text x="44" y="139" font-size="13" font-weight="700" fill="#0F1828">Pillar I</text>
<text x="44" y="155" font-size="10.5" fill="#4A5567">Surveillance &amp; Intelligence</text>
<rect x="250" y="120" width="320" height="44" rx="3" fill="#C9A84C"/>
<text x="560" y="147" font-size="14" font-weight="700" fill="#ffffff" text-anchor="end">8</text>
<text x="582" y="147" font-size="11" fill="#4A5567">~25–30 variants</text>
<text x="44" y="205" font-size="13" font-weight="700" fill="#0F1828">Pillar II</text>
<text x="44" y="221" font-size="10.5" fill="#4A5567">Loitering Munitions &amp; Strike</text>
<rect x="250" y="186" width="240" height="44" rx="3" fill="#C8443B"/>
<text x="480" y="213" font-size="14" font-weight="700" fill="#ffffff" text-anchor="end">6</text>
<text x="502" y="213" font-size="11" fill="#4A5567">~15–20 variants</text>
<text x="44" y="271" font-size="13" font-weight="700" fill="#0F1828">Pillar III</text>
<text x="44" y="287" font-size="10.5" fill="#4A5567">Air Defence &amp; Counter-UAS</text>
<rect x="250" y="252" width="120" height="44" rx="3" fill="#2BC5B4"/>
<text x="360" y="279" font-size="14" font-weight="700" fill="#ffffff" text-anchor="end">3</text>
<text x="382" y="279" font-size="11" fill="#4A5567">~8–10 variants</text>
<text x="44" y="337" font-size="13" font-weight="700" fill="#0F1828">Pillar IV</text>
<text x="44" y="353" font-size="10.5" fill="#4A5567">Special Mission &amp; Multi-Role</text>
<rect x="250" y="318" width="440" height="44" rx="3" fill="#0F1828"/>
<text x="680" y="345" font-size="14" font-weight="700" fill="#ffffff" text-anchor="end">11</text>
<text x="702" y="345" font-size="11" fill="#4A5567">~25–30 variants</text>
<text x="44" y="403" font-size="13" font-weight="700" fill="#0F1828">Pillar V</text>
<text x="44" y="419" font-size="10.5" fill="#4A5567">Logistics &amp; Sustainment</text>
<rect x="250" y="384" width="80" height="44" rx="3" fill="#4A5567"/>
<text x="320" y="411" font-size="14" font-weight="700" fill="#ffffff" text-anchor="end">2</text>
<text x="342" y="411" font-size="11" fill="#4A5567">~5–8 variants</text>
<text x="250" y="108" font-size="10.5" fill="#4A5567">Capability categories per pillar (bar) and estimated operational variants</text>
<line x1="40" y1="426" x2="740" y2="426" stroke="#E8E5DD" stroke-width="1"/>
<text x="40" y="444" font-size="10" fill="#4A5567">Source: Indian Army UAS &amp; Loitering Munitions roadmap (reconstructed); Techadyant Labs analysis.</text>
<text x="740" y="444" font-size="10" font-style="italic" fill="#C9A84C" text-anchor="end">Reconstructed</text>
</svg>