<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 470" font-family="Arial, Helvetica, sans-serif">
<rect width="820" height="470" fill="#FBF9F4"/>
<rect x="0" y="0" width="820" height="6" fill="#0F1828"/>
<text x="40" y="44" font-size="22" font-weight="700" fill="#0F1828">Who wins and who loses</text>
<text x="40" y="68" font-size="13" fill="#4A5567">Structural trajectories as value migrates below the platform</text>
<text x="780" y="30" font-size="11" fill="#4A5567" text-anchor="end">Techadyant Labs &#183; 2026</text>
<text x="210" y="118" font-size="14" font-weight="700" fill="#0f8e78" text-anchor="middle">&#9650; Winners (move up the stack)</text>
<text x="620" y="118" font-size="14" font-weight="700" fill="#C8443B" text-anchor="middle">&#9660; Losers (stuck at the airframe)</text>
<rect x="44" y="140" width="330" height="38" rx="5" fill="#e6f4f1" stroke="#0f8e78"/>
<text x="60" y="164" font-size="12" font-weight="700" fill="#0F1828">Autonomy / mission software</text>
<rect x="44" y="186" width="330" height="38" rx="5" fill="#e6f4f1" stroke="#0f8e78"/>
<text x="60" y="210" font-size="12" font-weight="700" fill="#0F1828">EO/IR &amp; seekers</text>
<rect x="44" y="232" width="330" height="38" rx="5" fill="#e6f4f1" stroke="#0f8e78"/>
<text x="60" y="256" font-size="12" font-weight="700" fill="#0F1828">EW / counter-UAS / RF</text>
<rect x="44" y="278" width="330" height="38" rx="5" fill="#e6f4f1" stroke="#0f8e78"/>
<text x="60" y="302" font-size="12" font-weight="700" fill="#0F1828">Trusted electronics / EMS</text>
<rect x="44" y="324" width="330" height="38" rx="5" fill="#e6f4f1" stroke="#0f8e78"/>
<text x="60" y="348" font-size="12" font-weight="700" fill="#0F1828">Loitering-munition specialists</text>
<rect x="44" y="370" width="330" height="38" rx="5" fill="#e6f4f1" stroke="#0f8e78"/>
<text x="60" y="394" font-size="12" font-weight="700" fill="#0F1828">Sustainment / MRO</text>
<rect x="448" y="140" width="330" height="38" rx="5" fill="#f7e9e6" stroke="#C8443B"/>
<text x="464" y="164" font-size="12" font-weight="700" fill="#0F1828">Commodity airframe assemblers</text>
<rect x="448" y="186" width="330" height="38" rx="5" fill="#f7e9e6" stroke="#C8443B"/>
<text x="464" y="210" font-size="12" font-weight="700" fill="#0F1828">Pure importers / re-badgers</text>
<rect x="448" y="232" width="330" height="38" rx="5" fill="#f7e9e6" stroke="#C8443B"/>
<text x="464" y="256" font-size="12" font-weight="700" fill="#0F1828">Single-platform startups (no IP)</text>
<text x="448" y="296" font-size="10.5" fill="#4A5567">Value migrates below the airframe: the platform is the line item, the subsystem is the annuity.</text>
<line x1="40" y1="436" x2="780" y2="436" stroke="#E8E5DD" stroke-width="1"/>
<text x="40" y="454" font-size="10" fill="#4A5567">Source: Indian Army UAS &amp; Loitering Munitions roadmap (reconstructed); Techadyant Labs analysis.</text>
<text x="780" y="454" font-size="10" font-style="italic" fill="#C9A84C" text-anchor="end">Assessment</text>
</svg>