<svg viewBox="0 0 1180 760" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <rect x="0" y="0" width="1180" height="760" fill="#FBF9F4"/>
  <text x="56" y="54" font-size="27" font-weight="700" fill="#0F1828">Six ways the dependency could be triggered</text>
  <text x="56" y="84" font-size="16" fill="#4A5567">Strategic-software risk scenarios, scored on economic impact against expected recovery time. Indicative, calibrated to real precedents.</text>
  <text x="1124" y="40" font-size="13" fill="#4A5567" text-anchor="end">Figure 12.1 · Techadyant Labs · 2026</text>

  <!-- plot area x 300..1090, y 150..610 -->
  <!-- dangerous quadrant shading (top-right: high impact, slow recovery) -->
  <rect x="695" y="150" width="395" height="230" fill="#C8443B" fill-opacity="0.08"/>
  <text x="712" y="172" font-size="13" font-weight="700" fill="#C8443B" opacity="0.8">DANGER ZONE</text>
  <text x="712" y="190" font-size="11.5" fill="#C8443B" opacity="0.8">high impact · slow recovery</text>

  <!-- axes -->
  <line x1="300" y1="610" x2="1090" y2="610" stroke="#0F1828" stroke-width="1.5"/>
  <line x1="300" y1="150" x2="300" y2="610" stroke="#0F1828" stroke-width="1.5"/>
  <!-- midlines -->
  <line x1="695" y1="150" x2="695" y2="610" stroke="#E8E5DD" stroke-width="1.5" stroke-dasharray="5 5"/>
  <line x1="300" y1="380" x2="1090" y2="380" stroke="#E8E5DD" stroke-width="1.5" stroke-dasharray="5 5"/>

  <!-- axis labels -->
  <text x="695" y="650" font-size="15" font-weight="700" fill="#0F1828" text-anchor="middle">RECOVERY TIME  →</text>
  <text x="320" y="636" font-size="12" fill="#4A5567">days–weeks</text>
  <text x="1088" y="636" font-size="12" fill="#4A5567" text-anchor="end">years</text>
  <text x="262" y="380" font-size="15" font-weight="700" fill="#0F1828" text-anchor="middle" transform="rotate(-90 262 380)">ECONOMIC IMPACT  →</text>
  <text x="290" y="606" font-size="12" fill="#4A5567" text-anchor="end">low</text>
  <text x="290" y="166" font-size="12" fill="#4A5567" text-anchor="end">severe</text>

  <!-- scenario bubbles. helper: cx, cy chosen for clean separation -->
  <!-- F export restriction (top-right corner) -->
  <circle cx="1030" cy="205" r="20" fill="#C8443B" fill-opacity="0.85"/>
  <text x="1030" y="211" font-size="16" font-weight="700" fill="#FBF9F4" text-anchor="middle">F</text>
  <text x="1078" y="252" font-size="13.5" font-weight="600" fill="#0F1828" text-anchor="end">Broad export restriction</text>

  <!-- A licence withdrawal -->
  <circle cx="880" cy="225" r="22" fill="#C8443B" fill-opacity="0.85"/>
  <text x="880" y="231" font-size="16" font-weight="700" fill="#FBF9F4" text-anchor="middle">A</text>
  <text x="838" y="288" font-size="13.5" font-weight="600" fill="#0F1828" text-anchor="middle">Licence / support withdrawal</text>
  <text x="838" y="306" font-size="11.5" fill="#4A5567" text-anchor="middle">(the Russia 2022 case)</text>

  <!-- D cyber/supply-chain attack -->
  <circle cx="700" cy="270" r="20" fill="#C9A84C" fill-opacity="0.9"/>
  <text x="700" y="276" font-size="16" font-weight="700" fill="#0F1828" text-anchor="middle">D</text>
  <text x="700" y="312" font-size="13.5" font-weight="600" fill="#0F1828" text-anchor="middle">Cyber / supply-chain attack</text>
  <text x="700" y="330" font-size="11.5" fill="#4A5567" text-anchor="middle">(SolarWinds — near-certain over time)</text>

  <!-- B cloud disruption (high impact, fast recovery — outage) -->
  <circle cx="455" cy="225" r="21" fill="#C9A84C" fill-opacity="0.9"/>
  <text x="455" y="231" font-size="16" font-weight="700" fill="#0F1828" text-anchor="middle">B</text>
  <text x="455" y="270" font-size="13.5" font-weight="600" fill="#0F1828" text-anchor="middle">Cloud disruption / outage</text>
  <text x="455" y="288" font-size="11.5" fill="#4A5567" text-anchor="middle">(CrowdStrike 2024)</text>
  <!-- arrow: sanctions variant shifts B toward A -->
  <path d="M 478 222 C 600 200, 720 205, 880 222" stroke="#4A5567" stroke-width="1.4" fill="none" stroke-dasharray="4 4"/>
  <path d="M 880 222 l -13 -5 l 3 11 z" fill="#4A5567"/>
  <text x="640" y="196" font-size="11" font-style="italic" fill="#4A5567" text-anchor="middle">sanctions variant →</text>

  <!-- C AI-model withdrawal (medium, rising) -->
  <circle cx="540" cy="455" r="19" fill="#2BC5B4" fill-opacity="0.9"/>
  <text x="540" y="461" font-size="16" font-weight="700" fill="#0F1828" text-anchor="middle">C</text>
  <text x="540" y="496" font-size="13.5" font-weight="600" fill="#0F1828" text-anchor="middle">AI-model withdrawal</text>
  <text x="540" y="514" font-size="11.5" fill="#4A5567" text-anchor="middle">(low today, rising fast)</text>
  <!-- arrow rising toward danger -->
  <path d="M 558 440 C 640 400, 720 350, 800 300" stroke="#2BC5B4" stroke-width="1.6" fill="none" stroke-dasharray="4 4"/>
  <path d="M 800 300 l -2 14 l 12 -7 z" fill="#2BC5B4"/>
  <text x="700" y="430" font-size="11" font-style="italic" fill="#1a8a7d" text-anchor="middle">rising as AI embeds →</text>

  <!-- E vendor bankruptcy -->
  <circle cx="700" cy="470" r="18" fill="#4A5567" fill-opacity="0.8"/>
  <text x="700" y="476" font-size="15" font-weight="700" fill="#FBF9F4" text-anchor="middle">E</text>
  <text x="700" y="505" font-size="13.5" font-weight="600" fill="#0F1828" text-anchor="middle">Vendor failure / acquisition</text>

  <text x="56" y="706" font-size="14" font-weight="700" fill="#0F1828">The geopolitical scenarios (A, F) sit alone in the danger zone — high impact, slow recovery — striking exactly the Captured ERP and cloud layers.</text>
  <text x="56" y="732" font-size="12.5" fill="#4A5567">Source: Techadyant Labs scenario model; calibrated to Russia 2022, CrowdStrike 2024, SolarWinds 2020. Impact &amp; recovery indicative, not measured.</text>
</svg>
