<text x="56" y="624" font-size="14" font-weight="700" fill="#0F1828">The fork is national. The same country reaches 71% captured or 38% sovereign depending on choices made before the 2027 window closes.</text>
<text x="56" y="676" font-size="12.5" fill="#4A5567">Source: Techadyant Labs DIEM model run forward under five scenarios. Trajectories are modelled and directional, not forecasts.</text>
