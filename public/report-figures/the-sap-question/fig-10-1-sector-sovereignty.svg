<svg viewBox="0 0 1180 820" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <rect x="0" y="0" width="1180" height="820" fill="#FBF9F4"/>
  <text x="56" y="56" font-size="27" font-weight="700" fill="#0F1828">Software Sovereignty Score, by sector</text>
  <text x="56" y="86" font-size="16" fill="#4A5567">0 = fully captured, 100 = fully sovereign. Derived from the EDI, weighted by each sector's reliance on each layer.</text>
  <text x="1124" y="40" font-size="13" fill="#4A5567" text-anchor="end">Figure 10.1 · Techadyant Labs · 2026</text>

  <!-- scale: bars start x=300, full width to x=1080 = 780px for 0..100 (7.8px per pt) -->
  <!-- gridlines -->
  <g stroke="#E8E5DD" stroke-width="1">
    <line x1="300" y1="150" x2="300" y2="610"/>
    <line x1="495" y1="150" x2="495" y2="610"/>
    <line x1="690" y1="150" x2="690" y2="610"/>
    <line x1="885" y1="150" x2="885" y2="610"/>
    <line x1="1080" y1="150" x2="1080" y2="610"/>
  </g>
  <g font-size="12" fill="#4A5567" text-anchor="middle">
    <text x="300" y="142">0</text><text x="495" y="142">25</text><text x="690" y="142">50</text><text x="885" y="142">75</text><text x="1080" y="142">100</text>
  </g>
  <text x="300" y="632" font-size="12" fill="#4A5567">← more captured</text>
  <text x="1080" y="632" font-size="12" fill="#4A5567" text-anchor="end">more sovereign →</text>

  <!-- rows: y from 175, step 62; bar height 30 -->
  <!-- Government 58 -->
  <text x="290" y="196" font-size="15" font-weight="600" fill="#0F1828" text-anchor="end">Government</text>
  <text x="290" y="214" font-size="11" fill="#4A5567" text-anchor="end">DPI-anchored ●●●</text>
  <rect x="300" y="180" width="452" height="30" rx="4" fill="#2BC5B4" fill-opacity="0.85"/>
  <text x="762" y="201" font-size="16" font-weight="700" fill="#1a8a7d" font-family="monospace">58</text>

  <!-- Banking 49 -->
  <text x="290" y="258" font-size="15" font-weight="600" fill="#0F1828" text-anchor="end">Banking</text>
  <text x="290" y="276" font-size="11" fill="#4A5567" text-anchor="end">Finacle / FLEXCUBE ●●●</text>
  <rect x="300" y="242" width="382" height="30" rx="4" fill="#2BC5B4" fill-opacity="0.6"/>
  <rect x="300" y="242" width="382" height="30" rx="4" fill="none" stroke="#0F1828" stroke-width="2"/>
  <text x="692" y="263" font-size="16" font-weight="700" fill="#1a8a7d" font-family="monospace">49</text>

  <!-- Defence 44 -->
  <text x="290" y="320" font-size="15" font-weight="600" fill="#0F1828" text-anchor="end">Defence</text>
  <text x="290" y="338" font-size="11" fill="#4A5567" text-anchor="end">custom core ●●●</text>
  <rect x="300" y="304" width="343" height="30" rx="4" fill="#C9A84C" fill-opacity="0.75"/>
  <text x="653" y="325" font-size="16" font-weight="700" fill="#9c7e1f" font-family="monospace">44</text>

  <!-- Telecom 38 -->
  <text x="290" y="382" font-size="15" font-weight="600" fill="#0F1828" text-anchor="end">Telecom</text>
  <text x="290" y="400" font-size="11" fill="#4A5567" text-anchor="end">mixed OSS/BSS ●●</text>
  <rect x="300" y="366" width="296" height="30" rx="4" fill="#C9A84C" fill-opacity="0.75"/>
  <text x="606" y="387" font-size="16" font-weight="700" fill="#9c7e1f" font-family="monospace">38</text>

  <!-- Healthcare 35 -->
  <text x="290" y="444" font-size="15" font-weight="600" fill="#0F1828" text-anchor="end">Healthcare</text>
  <text x="290" y="462" font-size="11" fill="#4A5567" text-anchor="end">low maturity ●●</text>
  <rect x="300" y="428" width="273" height="30" rx="4" fill="#C9A84C" fill-opacity="0.75"/>
  <text x="583" y="449" font-size="16" font-weight="700" fill="#9c7e1f" font-family="monospace">35</text>

  <!-- Energy 31 -->
  <text x="290" y="506" font-size="15" font-weight="600" fill="#0F1828" text-anchor="end">Energy / PSU</text>
  <text x="290" y="524" font-size="11" fill="#C8443B" text-anchor="end">SAP monoculture ●●●</text>
  <rect x="300" y="490" width="242" height="30" rx="4" fill="#C8443B" fill-opacity="0.8"/>
  <text x="552" y="511" font-size="16" font-weight="700" fill="#C8443B" font-family="monospace">31</text>

  <!-- Manufacturing 28 -->
  <text x="290" y="568" font-size="15" font-weight="600" fill="#0F1828" text-anchor="end">Manufacturing</text>
  <text x="290" y="586" font-size="11" fill="#C8443B" text-anchor="end">SAP/Oracle core ●●</text>
  <rect x="300" y="552" width="218" height="30" rx="4" fill="#C8443B" fill-opacity="0.8"/>
  <rect x="300" y="552" width="218" height="30" rx="4" fill="none" stroke="#0F1828" stroke-width="2"/>
  <text x="528" y="573" font-size="16" font-weight="700" fill="#C8443B" font-family="monospace">28</text>

  <!-- finding callout -->
  <rect x="300" y="668" width="780" height="118" rx="10" fill="#0F1828"/>
  <text x="324" y="702" font-size="16" font-weight="700" fill="#C9A84C">The finding: Banking (49) outscores Manufacturing (28) — by 21 points.</text>
  <text x="324" y="730" font-size="14" fill="#FBF9F4">Banking is no less strategic. It scores higher because India BUILT its core-banking products</text>
  <text x="324" y="752" font-size="14" fill="#FBF9F4">(Finacle, FLEXCUBE). Manufacturing IMPORTED its system of record (SAP/Oracle) and built nothing.</text>
  <text x="324" y="776" font-size="14" font-weight="700" fill="#2BC5B4">Where India built the product, sovereignty followed. Where it bought, it was captured.</text>

  <text x="56" y="812" font-size="12.5" fill="#4A5567">Source: Techadyant Labs Software Sovereignty Score (derived from EDI). ●● criticality flag. Scores indicative pending input hardening.</text>
</svg>
