    <rect x="490" y="1000" width="370" height="160" fill="#08111F" filter="url(#goldGlow)" />
    <rect x="490" y="1000" width="4" height="160" fill="#D4AF37" />
    
    <text x="520" y="1045" font-family="'Playfair Display', Georgia, serif" font-size="22" font-weight="bold" fill="#FFFFFF">INDIA DOES NOT NEED TO</text>
    <text x="520" y="1075" font-family="'Playfair Display', Georgia, serif" font-size="22" font-weight="bold" fill="#FFFFFF">WIN THE FAB RACE.</text>
    <text x="520" y="1113" font-family="'Playfair Display', Georgia, serif" font-size="19" font-weight="bold" fill="#D4AF37">IT NEEDS TO OWN THE LAYERS</text>
    <text x="520" y="1142" font-family="'Playfair Display', Georgia, serif" font-size="19" font-weight="bold" fill="#D4AF37">EVERY FAB DEPENDS ON.</text>

    <!-- Metrics Line -->
