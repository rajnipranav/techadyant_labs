    <!-- Metric 1 -->
    <text x="490" y="1225" font-family="'Space Mono', 'Courier New', monospace" font-size="10" fill="#6B7280" font-weight="bold" letter-spacing="1">CONFIDENCE</text>
    <text x="490" y="1245" font-family="'Inter', Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold">MODERATE–HIGH</text>
    
    <!-- Metric 2 -->
    <text x="630" y="1225" font-family="'Space Mono', 'Courier New', monospace" font-size="10" fill="#6B7280" font-weight="bold" letter-spacing="1">IMPACT</text>
    <text x="630" y="1245" font-family="'Inter', Arial, sans-serif" font-size="14" fill="#D4AF37" font-weight="bold">VERY HIGH</text>
    
    <!-- Metric 3 -->
    <text x="750" y="1225" font-family="'Space Mono', 'Courier New', monospace" font-size="10" fill="#6B7280" font-weight="bold" letter-spacing="1">HORIZON</text>
    <text x="750" y="1245" font-family="'Space Mono', 'Courier New', monospace" font-size="14" fill="#FFFFFF" font-weight="bold">2026–2035</text>


    <!-- ================= SECTION 5: FORECAST (1300 - 1550) ================= -->
