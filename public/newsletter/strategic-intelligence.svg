    <text x="130" y="1390" font-family="'Inter', Arial, sans-serif" font-size="14" fill="#9CA3AF">Meaningful packaging position achieved</text>
    <text x="860" y="1390" font-family="'Space Mono', 'Courier New', monospace" font-size="16" fill="#D4AF37" font-weight="bold" text-anchor="end">60%</text>
    <rect x="40" y="1402" width="820" height="8" fill="#0B1627" />
    <rect x="40" y="1402" width="492" height="8" fill="#D4AF37" />

    <!-- Bull Case -->
    <text x="40" y="1450" font-family="'Inter', Arial, sans-serif" font-size="15" fill="#FFFFFF" font-weight="bold">Bull Case</text>
    <text x="130" y="1450" font-family="'Inter', Arial, sans-serif" font-size="14" fill="#9CA3AF">Global packaging hub emerges</text>
    <text x="860" y="1450" font-family="'Space Mono', 'Courier New', monospace" font-size="16" fill="#FFFFFF" font-weight="bold" text-anchor="end">25%</text>
    <rect x="40" y="1462" width="820" height="8" fill="#0B1627" />
    <rect x="40" y="1462" width="205" height="8" fill="#9CA3AF" />

    <!-- Bear Case -->
    <text x="40" y="1510" font-family="'Inter', Arial, sans-serif" font-size="15" fill="#FFFFFF" font-weight="bold">Bear Case</text>
    <text x="130" y="1510" font-family="'Inter', Arial, sans-serif" font-size="14" fill="#9CA3AF">Assembly trap repeats</text>
    <text x="860" y="1510" font-family="'Space Mono', 'Courier New', monospace" font-size="16" fill="#6B7280" font-weight="bold" text-anchor="end">15%</text>
    <rect x="40" y="1522" width="820" height="8" fill="#0B1627" />
    <rect x="40" y="1522" width="123" height="8" fill="#1A2B4C" />

    <!-- ================= FOOTER (1550 - 1630) ================= -->
    <line x1="0" y1="1560" x2="900" y2="1560" stroke="#1A2B4C" />
    <rect x="0" y="1561" width="900" height="69" fill="#0B1627" />
    
    <!-- Logo Mark -->
    <g transform="translate(40, 1575)">
        <rect x="0" y="0" width="8" height="8" fill="none" stroke="#D4AF37" stroke-width="2"/>
        <rect x="12" y="0" width="8" height="20" fill="#D4AF37"/>
        <rect x="0" y="12" width="8" height="8" fill="#1A2B4C"/>
    </g>

    <text x="75" y="1590" font-family="'Inter', Arial, sans-serif" font-size="14" fill="#FFFFFF" font-weight="bold" letter-spacing="1">TECHADYANT LABS</text>
    <text x="75" y="1608" font-family="'Space Mono', 'Courier New', monospace" font-size="11" fill="#6B7280">Strategic Signals | May 2026</text>
    
    <text x="860" y="1598" font-family="'Inter', Arial, sans-serif" font-size="12" fill="#9CA3AF" font-style="italic" text-anchor="end">Mapping dependencies, constraints and beneficiaries in the global hardware stack.</text>

</svg>