    <rect x="40" y="730" width="250" height="120" fill="#08111F" stroke="#1A2B4C" />
    <rect x="40" y="730" width="250" height="4" fill="url(#fadeNavy)" />
    <text x="56" y="760" font-family="'Space Mono', 'Courier New', monospace" font-size="11" fill="#6B7280" font-weight="bold">SIGNAL #1</text>
    <text x="56" y="795" font-family="'Space Mono', 'Courier New', monospace" font-size="28" fill="#FFFFFF" font-weight="bold">$3.3B</text>
    <text x="56" y="820" font-family="'Inter', Arial, sans-serif" font-size="13" fill="#9CA3AF">Intel + 3DGS Odisha</text>
    <text x="56" y="838" font-family="'Inter', Arial, sans-serif" font-size="13" fill="#9CA3AF">Substrate Plant</text>

