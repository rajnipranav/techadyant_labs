    <rect x="0" y="660" width="900" height="260" fill="#0B1627" />
    <rect x="0" y="660" width="900" height="260" fill="url(#grid)" />
    <line x1="0" y1="660" x2="900" y2="660" stroke="#1A2B4C" />
    <line x1="0" y1="920" x2="900" y2="920" stroke="#1A2B4C" />

    <rect x="40" y="690" width="8" height="8" fill="#D4AF37" />
    <text x="56" y="698" font-family="'Space Mono', 'Courier New', monospace" font-size="14" fill="#D1D5DB" font-weight="bold" letter-spacing="1.5" text-transform="uppercase">2. The May 2026 Signals</text>

