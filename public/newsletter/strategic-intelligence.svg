    <text x="341" y="760" font-family="'Space Mono', 'Courier New', monospace" font-size="11" fill="#6B7280" font-weight="bold">SIGNAL #2</text>
    <text x="341" y="795" font-family="'Space Mono', 'Courier New', monospace" font-size="28" fill="#D4AF37" font-weight="bold">$120–150B</text>
