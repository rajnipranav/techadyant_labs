    <text x="450" y="571" font-family="'Inter', Arial, sans-serif" font-size="14" fill="#9CA3AF" font-weight="500" text-anchor="middle">Materials &amp; Chemicals</text>
    
    <!-- L7 -->
    <rect x="130" y="592" width="640" height="36" fill="#0B1627" stroke="#1A2B4C" />
    <text x="450" y="615" font-family="'Inter', Arial, sans-serif" font-size="14" fill="#9CA3AF" font-weight="500" text-anchor="middle">Power Infrastructure</text>

    <!-- Opportunity Zone Connectors & Box -->
    <line x1="680" y1="472" x2="730" y2="472" stroke="#D4AF37" stroke-width="1" />
    <line x1="710" y1="520" x2="730" y2="520" stroke="#D4AF37" stroke-width="1" />
    <rect x="730" y="472" width="140" height="48" fill="#08111F" stroke="#D4AF37" stroke-width="1" filter="url(#goldGlow)" />
    <text x="800" y="493" font-family="'Space Mono', 'Courier New', monospace" font-size="11" fill="#D4AF37" font-weight="bold" text-anchor="middle" letter-spacing="1">INDIA'S</text>
    <text x="800" y="509" font-family="'Space Mono', 'Courier New', monospace" font-size="11" fill="#D4AF37" font-weight="bold" text-anchor="middle" letter-spacing="1">OPPORTUNITY ZONE</text>

