    <text x="225" y="1095" font-family="'Inter', Arial, sans-serif" font-size="12" fill="#D1D5DB" font-weight="600" text-anchor="middle">L4: Assembly</text>
    
    <!-- L3 -->
    <rect x="100" y="1114" width="250" height="35" fill="#18140B" stroke="#D4AF37" stroke-width="1.5" />
    <text x="225" y="1136" font-family="'Inter', Arial, sans-serif" font-size="13" fill="#D4AF37" font-weight="bold" text-anchor="middle">L3: Components</text>
    
    <!-- L2 -->
    <rect x="80" y="1157" width="290" height="35" fill="#18140B" stroke="#D4AF37" stroke-width="1.5" />
    <text x="225" y="1179" font-family="'Inter', Arial, sans-serif" font-size="13" fill="#D4AF37" font-weight="bold" text-anchor="middle">L2: Substrates &amp; Pkg</text>
    
    <!-- L1 -->
    <rect x="60" y="1200" width="330" height="40" fill="#18140B" stroke="#D4AF37" stroke-width="1.5" />
    <text x="225" y="1225" font-family="'Inter', Arial, sans-serif" font-size="13" fill="#D4AF37" font-weight="bold" text-anchor="middle">L1: Materials &amp; Inputs</text>

    <!-- Annotation -->
    <text x="225" y="1275" font-family="'Inter', Arial, sans-serif" font-size="13" fill="#9CA3AF" font-style="italic" text-anchor="middle">"Value is captured where chokepoints exist."</text>
    <line x1="80" y1="1250" x2="370" y2="1250" stroke="#1A2B4C" stroke-width="1" />

