<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1630" width="100%" height="100%">
    <defs>
        <!-- Fonts -->
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=Playfair+Display:ital,wght@0,600;0,700;1,600&amp;family=Space+Mono:wght@400;700&amp;display=swap');
        </style>
        
        <!-- Gradients -->
        <linearGradient id="goldTextGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#FDE08B"/>
            <stop offset="100%" stop-color="#D4AF37"/>
        </linearGradient>

        <linearGradient id="fadeNavy" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#08111F" stop-opacity="0"/>
            <stop offset="50%" stop-color="#1A2B4C" stop-opacity="1"/>
            <stop offset="100%" stop-color="#08111F" stop-opacity="0"/>
        </linearGradient>

        <linearGradient id="fadeGold" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#08111F" stop-opacity="0"/>
            <stop offset="50%" stop-color="#D4AF37" stop-opacity="1"/>
            <stop offset="100%" stop-color="#08111F" stop-opacity="0"/>
        </linearGradient>

        <!-- Glow Effect for Word Compatibility -->
        <filter id="goldGlow" x="-10%" y="-20%" width="120%" height="140%">
            <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#D4AF37" flood-opacity="0.3"/>
        </filter>

        <!-- Tech Grid Pattern -->
        <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
            <circle cx="2" cy="2" r="1.5" fill="#1A2B4C" />
        </pattern>
    </defs>

    <!-- Main Background -->
    <rect width="100%" height="100%" fill="#08111F" />

    <!-- ================= HEADER (0 - 240) ================= -->
    <text x="40" y="60" font-family="'Space Mono', 'Courier New', monospace" font-size="12" fill="#6B7280" font-weight="bold" letter-spacing="2" text-transform="uppercase">Strategic Intelligence Briefing</text>
    <text x="860" y="60" font-family="'Space Mono', 'Courier New', monospace" font-size="12" fill="#D4AF37" font-weight="bold" text-anchor="end" letter-spacing="1">CLASSIFICATION: UNRESTRICTED</text>

    <text x="40" y="125" font-family="'Playfair Display', Georgia, serif" font-size="46" font-weight="bold" fill="#FFFFFF" letter-spacing="-0.5">INDIA BUYS INTO THE</text>
    <text x="40" y="180" font-family="'Playfair Display', Georgia, serif" font-size="46" font-weight="bold" fill="url(#goldTextGrad)" letter-spacing="-0.5">MIDDLE OF THE STACK</text>
    
    <text x="40" y="215" font-family="'Inter', Arial, sans-serif" font-size="19" font-weight="300" fill="#9CA3AF">Why India's Semiconductor Opportunity Is Advanced Packaging, Not Fabrication</text>

    <!-- Header Dividers -->
    <line x1="40" y1="240" x2="860" y2="240" stroke="#D4AF37" stroke-width="1" opacity="0.4"/>
    <line x1="40" y1="244" x2="860" y2="244" stroke="#1A2B4C" stroke-width="1"/>

    <!-- ================= SECTION 1: GLOBAL HARDWARE STACK (240 - 660) ================= -->
    <rect x="40" y="280" width="8" height="8" fill="#D4AF37" />
    <text x="56" y="288" font-family="'Space Mono', 'Courier New', monospace" font-size="14" fill="#D1D5DB" font-weight="bold" letter-spacing="1.5" text-transform="uppercase">1. The Global AI Hardware Stack</text>

    <!-- Stack Layers -->
    <!-- L1 -->
    <rect x="310" y="320" width="280" height="36" fill="#0B1627" stroke="#1A2B4C" />
    <text x="450" y="343" font-family="'Inter', Arial, sans-serif" font-size="14" fill="#9CA3AF" font-weight="500" text-anchor="middle">Applications</text>
    
    <!-- L2 -->
    <rect x="280" y="364" width="340" height="36" fill="#0B1627" stroke="#1A2B4C" />
    <text x="450" y="387" font-family="'Inter', Arial, sans-serif" font-size="14" fill="#9CA3AF" font-weight="500" text-anchor="middle">Foundation Models</text>
    
    <!-- L3 -->
    <rect x="250" y="408" width="400" height="36" fill="#0B1627" stroke="#1A2B4C" />
    <text x="450" y="431" font-family="'Inter', Arial, sans-serif" font-size="14" fill="#9CA3AF" font-weight="500" text-anchor="middle">Compute (GPUs / Accelerators)</text>
    
    <!-- L4 (GOLD) -->
    <rect x="220" y="452" width="460" height="40" fill="#18140B" stroke="#D4AF37" stroke-width="1.5" filter="url(#goldGlow)" />
    <text x="450" y="477" font-family="'Inter', Arial, sans-serif" font-size="15" fill="#D4AF37" font-weight="bold" letter-spacing="1" text-anchor="middle">ADVANCED PACKAGING</text>
    
    <!-- L5 (GOLD) -->
    <rect x="190" y="500" width="520" height="40" fill="#18140B" stroke="#D4AF37" stroke-width="1.5" filter="url(#goldGlow)" />
    <text x="450" y="525" font-family="'Inter', Arial, sans-serif" font-size="15" fill="#D4AF37" font-weight="bold" letter-spacing="1" text-anchor="middle">SUBSTRATES</text>
    
    <!-- L6 -->
